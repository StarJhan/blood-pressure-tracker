<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>血壓日記 App Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            user-select: none;
        }
        /* 🎨 優化：網頁版高對比、高通透毛玻璃 */
        .app-glass {
            background: rgba(30, 30, 34, 0.88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.01); opacity: 1; }
        }
        .pulse-effect { animation: subtlePulse 3s infinite ease-in-out; }
    </style>
</head>
<body class="bg-[#09090b] text-[#f4f4f5] antialiased pb-12">

            </div>
        </div>
        <div class="relative">
            <select id="themeSelector" onchange="selectTheme(this.value)" class="text-xs font-semibold bg-white/[0.08] hover:bg-white/[0.12] text-white border border-white/[0.15] pl-3 pr-8 py-2 rounded-xl shadow-sm outline-none appearance-none cursor-pointer focus:border-rose-500 transition-all active:scale-95 duration-200">
                <option value="classic" class="bg-[#18181b] text-white">🖤 預設經典</option>
                <option value="god" class="bg-[#18181b] text-white">🔮 玄女降肉</option>
                <option value="medical" class="bg-[#18181b] text-white">🏥 專業醫療</option>
                <option value="corp" class="bg-[#18181b] text-white">💼 社畜續命</option>
                <option value="cyber" class="bg-[#18181b] text-white">⚡ 賽博超頻</option>
            </select>
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-zinc-400 text-[10px]">▼</div>
        </div>
    </div>

    <div class="max-w-md mx-auto px-5 mt-6 space-y-6">

            <div class="absolute -right-6 -bottom-6 text-6xl opacity-[0.03] select-none" id="fortuneBgIcon">💡</div>
            <div class="flex items-center gap-2 mb-1.5">
                <span class="text-xs" id="fortuneDot">✨</span>
                <p id="fortuneTitle" class="text-xs font-bold tracking-wider text-zinc-400 uppercase">本日健康智慧</p>
            </div>
            <p id="fortuneText" class="text-xs text-zinc-100 font-normal leading-relaxed">正在為您同步機體與脈搏頻率...</p>
        </div>

        <div id="petCard" class="p-4 rounded-[2rem] app-glass border border-white/[0.06] flex items-center gap-4 transition-all duration-300 shadow-md">
            <div id="petAvatar" class="text-3xl p-2.5 bg-white/[0.06] rounded-2xl pulse-effect flex items-center justify-center">📊</div>
            <div class="flex-1 min-w-0">
                <p id="petName" class="text-xs font-bold text-zinc-400">智能健康管理導師</p>
                <p id="petSpeech" class="text-xs text-zinc-200 mt-1 font-normal leading-relaxed">歡迎回來。量血壓前請放鬆，讓我們開始點滴追蹤血管健康。</p>
            </div>
        </div>

        <div id="formCard" class="p-6 rounded-[2.5rem] app-glass border border-white/[0.08] shadow-2xl">
            <h2 id="form-title" class="text-base font-bold text-white mb-4 flex items-center gap-2">📝 登錄量測數據</h2>
            
            <div class="grid grid-cols-3 bg-black/40 p-1 rounded-2xl mb-5 border border-white/[0.06] shadow-inner">
                <button type="button" onclick="setMeasureCount(1)" id="btnCount1" class="text-xs py-2 rounded-xl font-medium transition-all duration-200 active:scale-95 text-zinc-400">單次量測</button>
                <button type="button" onclick="setMeasureCount(2)" id="btnCount2" class="text-xs py-2 rounded-xl font-medium transition-all duration-200 active:scale-95 text-zinc-400">連續2次</button>
                <button type="button" onclick="setMeasureCount(3)" id="btnCount3" class="text-xs py-2 rounded-xl font-semibold transition-all duration-200 active:scale-95 bg-white/[0.12] text-white shadow-md border border-white/[0.05]">3次平均值</button>
            </div>

            <form id="bpForm" class="space-y-5">
                <div id="inputsContainer" class="space-y-3"></div>

                <div class="pt-2">
                    <label id="lbl-mood-title" class="block text-xs font-bold text-zinc-400 mb-2.5 pl-1">當前身體 / 心情狀態</label>
                    <div class="flex flex-wrap gap-2 no-scrollbar max-h-24 overflow-y-auto pb-1" id="tagContainer"></div>
                    
                    <div class="flex gap-2 mt-4 bg-black/30 p-1.5 rounded-2xl border border-white/[0.08] focus-within:border-rose-500/40 focus-within:bg-black/50 transition-all duration-300">
                        <input type="text" id="customTagInput" placeholder="輸入自訂備註..." 
                            class="flex-1 bg-transparent px-3 py-1.5 text-xs text-white placeholder-zinc-600 outline-none">
                        <button type="button" onclick="addCustomTag()" id="custom-tag-btn"
                            class="bg-white/[0.1] text-white hover:bg-white/[0.15] active:scale-[0.94] font-semibold text-xs px-4 py-1.5 rounded-xl transition-all shadow-sm border border-white/[0.05] duration-200">
                            ＋新增
                        </button>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-rose-500 to-orange-500 text-white font-bold py-4 rounded-2xl shadow-[0_6px_25px_rgba(244,63,94,0.25)] hover:shadow-[0_8px_30px_rgba(244,63,94,0.4)] active:scale-[0.97] transition-all duration-200 text-sm mt-3 tracking-wide border border-white/[0.1]">
                    儲存本次健康數據
                </button>
            </form>

            <h2 id="chart-title" class="text-base font-bold text-white mb-4 flex items-center gap-2">📊 歷史趨勢折線圖</h2>
            <div class="relative w-full h-48">

        </div>

            </div>

            </div>
        </div>

                detailArrow: "🔽 細節",
                glassStyle: "rgba(36, 20, 44, 0.90)",
                normalAdvice: "核心水冷管線壓力完全符合出廠設定。系統效能極大化，准予繼續執行凡塵地表任務。",
                highAdvice: "核心管路壓力超載臨界！主幫浦高壓異常超頻！偵測到硬體嚴重過熱，請立刻啟動安全降載躺平機制！",
                lowAdvice: "警報：偵測到核心傳導幫浦功率偏低，流體交互速度遲緩。請立即接入能源並進入低能耗休眠。",
                alertRange: "⚡ 系統錯誤：硬體傳入參數溢出核心耐壓網格！\n主幫浦限制：50~250，副管路限制：30~180。",
                confirmClear: "警告：即將徹底格式化黑匣子核心磁碟！確認清除所有機體紀錄？"
            }
        };

        const fortunesList = [
            "大吉 🌟 血管天庭飽滿！氣血順暢得像開高速公路，今日宜維持好心情！",
            "中吉 ☕ 量血壓前與冰咖啡保持三十步距離，方能避開數據調皮之災。",
            "小吉 🦶 秘訣：量測時雙腳平放、不交叉、不說話，血管最舒服！",
            "上上簽 🍦 心情愉悅則百病不侵，今天對鏡子裡的自己微笑三次可開運。",
            "微吉 🛌 昨晚睡得飽，血管沒煩惱！今晚宜提早強制登出休息。"
        ];

        document.getElementById('fortuneText').innerText = fortunesList[Math.floor(Math.random() * fortunesList.length)];

        function selectTheme(themeName) {
            currentTheme = themeName;
            updateUI();
        }

        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            let html = '';

            for (let i = 1; i <= currentMeasureCount; i++) {
                let labelPrefix = '';
                if (currentMeasureCount === 3) {
                    if (currentTheme === 'god') {
                        if (i === 1) labelPrefix = '🔮 800英呎處';
                        if (i === 2) labelPrefix = '🔮 500英呎處';
                        if (i === 3) labelPrefix = '🔮 中華路降肉';
                    } else if (currentTheme === 'corp') {
                        if (i === 1) labelPrefix = '💼 進公司初檢';
                        if (i === 2) labelPrefix = '💼 開會後耐壓';
                        if (i === 3) labelPrefix = '💼 主管痛釘點';
                    } else if (currentTheme === 'cyber') {
                        if (i === 1) labelPrefix = '⚡ 一軌初描';
                        if (i === 2) labelPrefix = '⚡ 二軌複查';
                        if (i === 3) labelPrefix = '⚡ 核心合盤';
                    } else {
                        labelPrefix = `第 ${i} 次量測`;
                    }
                } else if (currentMeasureCount === 2) {
                    labelPrefix = `量測組別 ${i}`;
                } else {
                    labelPrefix = currentTheme === 'god' ? '即刻降肉核心' : (currentTheme === 'cyber' ? '核心主線數據' : '單次精準量測');
                }

                html += `
                    <div class="bg-black/30 p-4 rounded-2xl border border-white/[0.05] transition-all">
                        <p class="text-[11px] font-bold text-zinc-300 mb-2.5 tracking-wide flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span>${labelPrefix}</p>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-400 mb-1 text-center">收縮壓(高壓)</label>
                                <input type="number" inputmode="numeric" id="sys_${i}" required placeholder="mmHg" 
                                    class="w-full bg-black/50 border border-white/[0.12] rounded-xl py-2.5 text-center text-base font-bold text-rose-400 focus:outline-none focus:border-rose-500 focus:bg-black/70 transition-all placeholder-zinc-700 shadow-inner">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-400 mb-1 text-center">舒張壓(低壓)</label>
                                <input type="number" inputmode="numeric" id="dia_${i}" required placeholder="mmHg" 
                                    class="w-full bg-black/50 border border-white/[0.12] rounded-xl py-2.5 text-center text-base font-bold text-cyan-400 focus:outline-none focus:border-cyan-500 focus:bg-black/70 transition-all placeholder-zinc-700 shadow-inner">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-zinc-400 mb-1 text-center">心率(脈搏)</label>
                                <input type="number" inputmode="numeric" id="pulse_${i}" required placeholder="bpm" 
                                    class="w-full bg-black/50 border border-white/[0.12] rounded-xl py-2.5 text-center text-base font-bold text-emerald-400 focus:outline-none focus:border-emerald-500 focus:bg-black/70 transition-all placeholder-zinc-700 shadow-inner">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function setMeasureCount(count) {
            currentMeasureCount = count;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btnCount${i}`);
                if (i === count) {
                    btn.className = "text-xs py-2 rounded-xl font-bold transition-all bg-white/[0.12] text-white shadow-md border border-white/[0.05]";
                } else {
                    btn.className = "text-xs py-2 rounded-xl font-medium transition-all text-zinc-400 hover:text-white active:scale-95";
                }
            }
            renderInputs();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const tags = langDict[currentTheme].tags;
            container.innerHTML = tags.map(tag => `
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-white/[0.05] hover:bg-white/[0.08] active:scale-95 text-zinc-300 text-xs px-3.5 py-2 rounded-xl border border-white/[0.06] transition-all duration-150 whitespace-nowrap shadow-sm font-medium">${tag}</button>
            `).join('');
        }

        function toggleTag(btn) {
            if (btn.classList.contains('active-tag')) {
                btn.className = "tag-btn bg-white/[0.05] hover:bg-white/[0.08] active:scale-95 text-zinc-300 text-xs px-3.5 py-2 rounded-xl border border-white/[0.06] transition-all duration-150 whitespace-nowrap shadow-sm font-medium";
                btn.classList.remove('active-tag');
            } else {
                let activeStyle = "bg-gradient-to-r from-rose-500/20 to-orange-500/20 text-orange-400 border-orange-500/40 shadow-md shadow-orange-500/5";
                if(currentTheme === 'god') activeStyle = "bg-amber-500/20 text-amber-300 border-amber-500/40 shadow-md shadow-amber-500/5";
                if(currentTheme === 'medical') activeStyle = "bg-blue-500/20 text-blue-300 border-blue-500/40 shadow-md shadow-blue-500/5";
                if(currentTheme === 'corp') activeStyle = "bg-teal-500/20 text-teal-300 border-teal-500/40 shadow-md shadow-teal-500/5";
                if(currentTheme === 'cyber') activeStyle = "bg-purple-500/20 text-fuchsia-300 border-fuchsia-500/40 shadow-md shadow-fuchsia-500/5";

                btn.className = `tag-btn ${activeStyle} text-xs px-3.5 py-2 rounded-xl border font-bold transition-all duration-150 whitespace-nowrap active-tag`;
            }
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const text = input.value.trim();
            if (!text) return;

            const tagText = text.startsWith('#') ? text : '#' + text;
            const container = document.getElementById('tagContainer');
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.onclick = function() { toggleTag(this); };
            
            let activeStyle = "bg-gradient-to-r from-rose-500/20 to-orange-500/20 text-orange-400 border-orange-500/40 shadow-md shadow-orange-500/5";
            newBtn.className = `tag-btn ${activeStyle} text-xs px-3.5 py-2 rounded-xl border font-bold transition-all whitespace-nowrap active-tag`;
            newBtn.innerText = tagText;

            container.appendChild(newBtn);
            input.value = '';
        }

        document.getElementById('bpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let totalSys = 0, totalDia = 0, totalPulse = 0;
            let detailRecords = [];

            for (let i = 1; i <= currentMeasureCount; i++) {
                const sys = parseInt(document.getElementById(`sys_${i}`).value);
                const dia = parseInt(document.getElementById(`dia_${i}`).value);
                const pulse = parseInt(document.getElementById(`pulse_${i}`).value);
                
                if (sys < 50 || sys > 250 || dia < 30 || dia > 180) {
                    alert(langDict[currentTheme].alertRange);
                    return;
                }

                totalSys += sys;
                totalDia += dia; 
                totalPulse += pulse;

                detailRecords.push({ sys, dia, pulse });
            }

            const avgSys = Math.round(totalSys / currentMeasureCount);
            const avgDia = Math.round(totalDia / currentMeasureCount);
            const avgPulse = Math.round(totalPulse / currentMeasureCount);
            
            const activeTags = [];
            document.querySelectorAll('.tag-btn.active-tag').forEach(btn => activeTags.push(btn.innerText));
            if (currentMeasureCount > 1) {
                let modeTag = `📊 ${currentMeasureCount}次平均`;
                if(currentTheme === 'god') modeTag = `🪶 玄女合盤`;
                if(currentTheme === 'corp') modeTag = `💼 壓力整合`;
                if(currentTheme === 'cyber') modeTag = `⚡ 3軌同步`;
                activeTags.push(modeTag);
            }

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                sys: avgSys,
                dia: avgDia,
                pulse: avgPulse,
                tags: activeTags.join(' '),
                details: detailRecords
            };

            bpData.unshift(newRecord);
            localStorage.setItem('bpRecords', JSON.stringify(bpData));

            interactPet(avgSys, avgDia);
            updateUI();
        });

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                arrow.innerText = '🔼';
            } else {
                el.classList.add('hidden');
                arrow.innerText = '🔽 細節';
            }
        }

        function interactPet(sys, dia) {
            const avatar = document.getElementById('petAvatar');
            const speech = document.getElementById('petSpeech');
            const card = document.getElementById('petCard');
            const dict = langDict[currentTheme];

            if (sys < 120 && dia < 80) {
                card.style.borderColor = 'rgba(16, 185, 129, 0.4)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️✨" : (currentTheme === 'cyber' ? "🤖🌌" : "🧑‍⚕️💚");
                speech.innerText = dict.normalAdvice;
            } else if (sys >= 140 || dia >= 90) {
                card.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                avatar.innerText = currentTheme === 'god' ? "👹🛑" : (currentTheme === 'cyber' ? "🚨⚡" : "🩺⚠️");
                speech.innerText = dict.highAdvice;
            } else {
                card.style.borderColor = 'rgba(245, 158, 11, 0.4)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️🌀" : (currentTheme === 'cyber' ? "🤖🌀" : "📊🟡");
                speech.innerText = dict.lowAdvice;
            }
        }

        function updateUI() {
            const dict = langDict[currentTheme];
            
            const glasses = document.querySelectorAll('.app-glass');
            glasses.forEach(el => {
                el.style.backgroundColor = dict.glassStyle;
            });

            document.getElementById('app-title').innerText = dict.appTitle;
            document.getElementById('app-subtitle').innerText = dict.appSubtitle;
            document.getElementById('app-icon').innerText = dict.icon;
            document.getElementById('app-icon').className = `w-10 h-10 rounded-2xl flex items-center justify-center text-xl bg-gradient-to-tr ${dict.iconBg}`;
            
            document.getElementById('fortuneTitle').innerText = dict.fortuneTitle;
            document.getElementById('fortuneDot').innerText = dict.fortuneDot;
            document.getElementById('fortuneBgIcon').innerText = dict.fortuneBgIcon;

            document.getElementById('form-title').innerText = dict.formTitle;
            document.getElementById('lbl-mood-title').innerText = dict.moodTitle;
            document.getElementById('customTagInput').placeholder = dict.customPlaceholder;
            document.getElementById('custom-tag-btn').innerText = dict.customBtn;
            
            document.getElementById('submit-btn').innerText = dict.submitBtn;
            document.getElementById('submit-btn').className = `w-full bg-gradient-to-r ${dict.submitBtnBg} text-white font-bold py-4 rounded-2xl active:scale-[0.97] hover:opacity-95 transition-all text-sm mt-3 tracking-wide border border-white/[0.08] duration-200 cursor-pointer`;
            
            document.getElementById('chart-title').innerText = dict.chartTitle;
            document.getElementById('history-title').innerText = dict.historyTitle;
            document.getElementById('export-btn').innerText = dict.exportBtn;
            document.getElementById('clear-btn').innerText = dict.clearBtn;
            document.getElementById('petName').innerText = dict.petName;

            if (bpData.length > 0) {
                interactPet(bpData[0].sys, bpData[0].dia);
            } else {
                document.getElementById('petCard').style.borderColor = 'rgba(255,255,255,0.06)';
                document.getElementById('petAvatar').innerText = dict.petAvatar;
                document.getElementById('petSpeech').innerText = dict.petSpeech;
            }

            renderTags();
            setMeasureCount(currentMeasureCount);

            const listContainer = document.getElementById('historyList');
            if (bpData.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-zinc-500 py-8 text-xs">${dict.emptyText}</p>`;
            } else {
                listContainer.innerHTML = bpData.map(r => {
                    let detailsHtml = '';
                    if (r.details && r.details.length > 1) {
                        detailsHtml = `<div id="detail-${r.id}" class="hidden mt-2.5 p-3.5 bg-black/40 rounded-2xl text-[12px] text-zinc-300 space-y-2 border border-white/[0.06] shadow-inner">`;
                        r.details.forEach((d, idx) => {
                            let prefix = `第 ${idx+1} 次量測`;
                            if (r.details.length === 3) {
                                if (currentTheme === 'god') {
                                    if (idx === 0) prefix = '🔮 800英呎處';
                                    if (idx === 1) prefix = '🔮 500英呎處';
                                    if (idx === 2) prefix = '🔮 中華路降肉';
                                } else if (currentTheme === 'corp') {
                                    if (idx === 0) prefix = '💼 進公司初檢';
                                    if (idx === 1) prefix = '💼 開會後耐壓';
                                    if (idx === 2) prefix = '💼 主管痛釘點';
                                } else if (currentTheme === 'cyber') {
                                    if (idx === 0) prefix = '⚡ 一軌初描';
                                    if (idx === 1) prefix = '⚡ 二軌複查';
                                    if (idx === 2) prefix = '⚡ 核心合盤';
                                }
                            }
                            detailsHtml += `<p class="flex justify-between"><span>${prefix}</span><span class="font-bold text-zinc-100">高壓 ${d.sys} / 低壓 ${d.dia} / 心率 ${d.pulse}</span></p>`;
                        });
                        detailsHtml += `</div>`;
                    }

                    return `
                        <div class="py-4 transition-all">
                            <div class="flex justify-between items-center">
                                <div onclick="${r.details && r.details.length > 1 ? `toggleDetail(${r.id})` : ''}" class="cursor-pointer flex-1 pr-4">
                                    <div class="flex items-center gap-2">
                                        <p class="text-[11px] text-zinc-400 font-bold tracking-tight">${r.date}</p>
                                        ${r.details && r.details.length > 1 ? `<span id="arrow-${r.id}" class="text-[10px] bg-white/[0.08] px-2 py-0.5 rounded-lg text-zinc-200 font-medium border border-white/[0.05] active:scale-95 transition-all">🔽 細節</span>` : ''}
                                    </div>
                                    <p class="text-xs font-bold text-orange-400/90 mt-1.5 tracking-wide">${r.tags || '🐾 日常追蹤'}</p>
                                </div>
                                <div class="text-right flex items-center gap-2">
                                    <div class="bg-white/[0.05] px-3.5 py-1.5 rounded-2xl border border-white/[0.06] shadow-sm">
                                        <span class="font-bold text-white text-base tracking-tight">${r.sys}</span>
                                        <span class="text-zinc-500 text-xs mx-0.5">/</span>
                                        <span class="font-bold text-zinc-300 text-base tracking-tight">${r.dia}</span>
                                    </div>
                                    <span class="text-xs text-zinc-300 font-bold w-12 text-center flex items-center justify-center gap-0.5">❤️${r.pulse}</span>
                                </div>
                            </div>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
            }

            const chartData = [...bpData].slice(0, 7).reverse();
            const labels = chartData.map(r => r.date.split(' ')[0]);
            const sysValues = chartData.map(r => r.sys);
            const diaValues = chartData.map(r => r.dia);

            if (bpChart) bpChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            let themeHighColor = '#ef4444';
            let themeLowColor = '#06b6d4';
            
            if(currentTheme === 'cyber') { themeHighColor = '#f43f5e'; themeLowColor = '#d946ef'; }
            if(currentTheme === 'corp') { themeHighColor = '#f43f5e'; themeLowColor = '#14b8a6'; }
            if(currentTheme === 'god') { themeHighColor = '#fbbf24'; themeLowColor = '#f43f5e'; }

            bpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: dict.chartLabel1, data: sysValues, borderColor: themeHighColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 3, pointRadius: 3.5, pointBackgroundColor: themeHighColor },
                        { label: dict.chartLabel2, data: diaValues, borderColor: themeLowColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 3, pointRadius: 3.5, pointBackgroundColor: themeLowColor }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { boxWidth: 6, color: '#f4f4f5', font: { size: 11, weight: '700' } } } 
                    },
                    scales: { 
                        y: { ticks: { color: '#a1a1aa', font: { size: 10, weight: '600' } }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                        x: { ticks: { color: '#a1a1aa', font: { size: 10, weight: '600' } }, grid: { display: false } } 
                    }
                }
            });
        }

        function exportCSV() {
            if(bpData.length === 0) return alert('沒有歷史紀錄可以匯出檔案唷');
            let csvContent = "\uFEFF日期時間,平均高壓,平均低壓,平均心跳,標籤狀態,詳細各次紀錄\n";
            bpData.forEach(r => { 
                let detailsStr = '';
                if(r.details) {
                    detailsStr = r.details.map((d, i) => `[第${i+1}次:${d.sys}/${d.dia}/${d.pulse}]`).join(' ');
                }
                csvContent += `${r.date},${r.sys},${r.dia},${r.pulse},${r.tags},${detailsStr}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `血壓日記_網頁清晰版_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearData() {
            if (confirm(langDict[currentTheme].confirmClear)) {
                bpData = [];
                localStorage.removeItem('bpRecords');
                updateUI();
            }
        }

        window.onload = () => {
            updateUI();
        };
    </script>
</body>
</html>
