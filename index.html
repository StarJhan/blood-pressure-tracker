    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            user-select: none;
            background: linear-gradient(135deg, #fff0f5 0%, #f0f8ff 50%, #f5f0ff 100%);
            background-attachment: fixed;
        }
        .app-bubble-card {
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .pulse-effect { animation: subtlePulse 3s infinite ease-in-out; }
    </style>

                normalAdvice: "平均數據安全合格。看來今天沒被豬隊友氣到，血管通暢，特准你立刻下班去買杯珍奶續命！",
                highAdvice: "緊急警報！血壓直接衝破季度 KPI 了！別拿公司的薪水懲罰血管，現在立刻去茶水間摸魚10分鐘！",
                lowAdvice: "偵測到核心動力嚴重下滑。是不是又在做沒產值的雜事了？今晚宜強制登出拒絕加班！",
                alertRange: "💼 逼逼！Bug提報！數據不合常理！\n高壓必須在 50~250，低壓必須在 30~180。請重新輸入。",
                confirmClear: "一鍵清除所有加班揉躪歷史（光速離職抹除所有記憶）？"
            },
            cyber: {
                appTitle: "繽紛賽博機體效能檢測",
                appSubtitle: "Cyberpunk Candy OS",
                icon: "🤖",
                iconBg: "from-fuchsia-400 via-purple-400 to-cyan-400 shadow-fuchsia-400/30",
                fortuneTitle: "🦾 機體系統核心日誌",
                fortuneDot: "⚡",
                fortuneBgIcon: "🤖",
                petName: "AI 核心管理架構",
                petAvatar: "🦾",
                petSpeech: "偵測到外部生物體連結。請接入充氣袖帶，開始掃描核心管路壓力與幫浦時脈。",
                formTitle: "⚡ 核心幫浦運作參數輸入",
                countBtn1: "核心初檢",
                countBtn2: "雙軌複查",
                countBtn3: "系統效能3軌合盤",
                moodTitle: "硬體元件目前超頻負載",
                tags: ["☀️ 機體剛開機", "🌙 進入休眠區", "💊 注入修復奈米", "☕ 核心超頻中", "🌀 硬體嚴重過熱"],
                customPlaceholder: "輸入自訂核心過載負載...",
                customBtn: "＋改寫補丁",
                submitBtn: "⚡ 執行二進位核心同步 ⚡",
                submitBtnBg: "from-fuchsia-400 via-purple-400 to-cyan-400 shadow-fuchsia-400/30",
                chartTitle: "🌌 核心水冷管線壓力波形",
                chartLabel1: "主幫浦超頻 (SYS)",
                chartLabel2: "副管路回流 (DIA)",
                historyTitle: "💾 機體歷史黑匣子報告",
                exportBtn: "📥 匯出數據",
                clearBtn: "⚡ 格式化",
                emptyText: "儲存核心內沒有任何機體參數",
                detailArrow: "🔽 細節",
                bodyBg: "linear-gradient(135deg, #faf0ff 0%, #e6f0ff 100%)",
                cardStyle: "rgba(255, 252, 255, 0.94)",
                textColor: "#2b123a",
                normalAdvice: "核心水冷管線壓力完全符合出廠設定。系統效能極大化，准予繼續執行凡塵地表任務。",
                highAdvice: "核心管路壓力超載臨界！主幫浦高壓異常超頻！偵測到硬體嚴重過熱，請立刻啟動安全降載躺平機制！",
                lowAdvice: "警報：偵測到核心傳導幫浦功率偏低，流體交互速度遲緩。請立即接入能源並進入低能耗休眠。",
                alertRange: "⚡ 系統錯誤：硬體傳入參數溢出核心耐壓網格！\n主幫浦限制：50~250，副管路限制：30~180。",
                confirmClear: "警告：即將徹底格式化黑匣子核心磁碟！確認清除所有機體紀錄？"
            }
        };

        const fortunesList = [
            "大吉 🌟 血管天庭飽滿！氣血順暢得像開高速公路，今日宜維持好心情！",
            "中吉 ☕ 量血壓前與冰咖啡保持三十步距離，方能避開數據調皮之災。",
            "小吉 🦶 秘訣：量測時雙腳平放、不交叉、不說話，血管最舒服！",
            "上上簽 🍦 心情愉悅則百病不侵，今天對鏡子裡的自己微笑三次可開運。",
            "微吉 🛌 昨晚睡得飽，血管沒煩惱！今晚宜提早強制登出休息。"
        ];

        document.getElementById('fortuneText').innerText = fortunesList[Math.floor(Math.random() * fortunesList.length)];

        function selectTheme(themeName) {
            currentTheme = themeName;
            updateUI();
        }

        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            let html = '';

            for (let i = 1; i <= currentMeasureCount; i++) {
                let labelPrefix = '';
                if (currentMeasureCount === 3) {
                    if (currentTheme === 'god') {
                        if (i === 1) labelPrefix = '🔮 800英呎處';
                        if (i === 2) labelPrefix = '🔮 500英呎處';
                        if (i === 3) labelPrefix = '🔮 中華路降肉';
                    } else if (currentTheme === 'corp') {
                        if (i === 1) labelPrefix = '💼 進公司初檢';
                        if (i === 2) labelPrefix = '💼 開會後耐壓';
                        if (i === 3) labelPrefix = '💼 主管痛釘點';
                    } else if (currentTheme === 'cyber') {
                        if (i === 1) labelPrefix = '⚡ 一軌初描';
                        if (i === 2) labelPrefix = '⚡ 二軌複查';
                        if (i === 3) labelPrefix = '⚡ 核心合盤';
                    } else {
                        labelPrefix = `第 ${i} 次量測`;
                    }
                } else if (currentMeasureCount === 2) {
                    labelPrefix = `量測組別 ${i}`;
                } else {
                    labelPrefix = currentTheme === 'god' ? '即刻降肉核心' : (currentTheme === 'cyber' ? '核心主線數據' : '單次精準量測');
                }

                html += `
                    <div class="bg-pink-50/30 p-4 rounded-2xl border border-pink-100/40 transition-all shadow-sm">
                        <p class="text-[11px] font-extrabold text-pink-500/90 mb-2.5 tracking-wide flex items-center gap-1.5"><span class="w-1.5 h-1.5 rounded-full bg-pink-400 animate-ping"></span>${labelPrefix}</p>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-1 text-center">高壓(SYS)</label>
                                <input type="number" inputmode="numeric" id="sys_${i}" required placeholder="mmHg" 
                                    class="w-full bg-white border-2 border-pink-100 rounded-xl py-2.5 text-center text-base font-extrabold text-pink-500 focus:outline-none focus:border-pink-300 transition-all placeholder-gray-300 shadow-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-1 text-center">低壓(DIA)</label>
                                <input type="number" inputmode="numeric" id="dia_${i}" required placeholder="mmHg" 
                                    class="w-full bg-white border-2 border-pink-100 rounded-xl py-2.5 text-center text-base font-extrabold text-cyan-500 focus:outline-none focus:border-cyan-300 transition-all placeholder-gray-300 shadow-sm">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-1 text-center">心率(Pulse)</label>
                                <input type="number" inputmode="numeric" id="pulse_${i}" required placeholder="bpm" 
                                    class="w-full bg-white border-2 border-pink-100 rounded-xl py-2.5 text-center text-base font-extrabold text-amber-500 focus:outline-none focus:border-amber-300 transition-all placeholder-gray-300 shadow-sm">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function setMeasureCount(count) {
            currentMeasureCount = count;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btnCount${i}`);
                if (i === count) {
                    btn.className = "text-xs py-2 rounded-xl font-extrabold transition-all bg-white text-pink-500 shadow-md border border-pink-100";
                } else {
                    btn.className = "text-xs py-2 rounded-xl font-bold transition-all text-pink-400/70 hover:text-pink-500 active:scale-95";
                }
            }
            renderInputs();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const tags = langDict[currentTheme].tags;
            container.innerHTML = tags.map(tag => `
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-white hover:bg-pink-50/40 active:scale-95 text-gray-600 text-xs px-3.5 py-2 rounded-xl border-2 border-pink-100/50 transition-all duration-150 whitespace-nowrap shadow-sm font-bold">${tag}</button>
            `).join('');
        }

        function toggleTag(btn) {
            if (btn.classList.contains('active-tag')) {
                btn.className = "tag-btn bg-white hover:bg-pink-50/40 active:scale-95 text-gray-600 text-xs px-3.5 py-2 rounded-xl border-2 border-pink-100/50 transition-all duration-150 whitespace-nowrap shadow-sm font-bold";
                btn.classList.remove('active-tag');
            } else {
                let activeStyle = "bg-gradient-to-r from-pink-400/20 to-orange-400/20 text-pink-600 border-pink-400 shadow-sm";
                if(currentTheme === 'god') activeStyle = "bg-purple-400/20 text-purple-600 border-purple-400 shadow-sm";
                if(currentTheme === 'medical') activeStyle = "bg-cyan-400/20 text-cyan-600 border-cyan-400 shadow-sm";
                if(currentTheme === 'corp') activeStyle = "bg-emerald-400/20 text-emerald-600 border-emerald-400 shadow-sm";
                if(currentTheme === 'cyber') activeStyle = "bg-fuchsia-400/20 text-fuchsia-600 border-fuchsia-400 shadow-sm";

                btn.className = `tag-btn ${activeStyle} text-xs px-3.5 py-2 rounded-xl border-2 font-extrabold transition-all duration-150 whitespace-nowrap active-tag`;
            }
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const text = input.value.trim();
            if (!text) return;

            const tagText = text.startsWith('#') ? text : '#' + text;
            const container = document.getElementById('tagContainer');
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.onclick = function() { toggleTag(this); };
            
            let activeStyle = "bg-gradient-to-r from-pink-400/20 to-orange-400/20 text-pink-600 border-pink-400 shadow-sm";
            newBtn.className = `tag-btn ${activeStyle} text-xs px-3.5 py-2 rounded-xl border-2 font-extrabold transition-all whitespace-nowrap active-tag`;
            newBtn.innerText = tagText;

            container.appendChild(newBtn);
            input.value = '';
        }

        document.getElementById('bpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let totalSys = 0, totalDia = 0, totalPulse = 0;
            let detailRecords = [];

            for (let i = 1; i <= currentMeasureCount; i++) {
                const sys = parseInt(document.getElementById(`sys_${i}`).value);
                const dia = parseInt(document.getElementById(`dia_${i}`).value);
                const pulse = parseInt(document.getElementById(`pulse_${i}`).value);
                
                if (sys < 50 || sys > 250 || dia < 30 || dia > 180) {
                    alert(langDict[currentTheme].alertRange);
                    return;
                }

                totalSys += sys;
                totalDia += dia; 
                totalPulse += pulse;

                detailRecords.push({ sys, dia, pulse });
            }

            const avgSys = Math.round(totalSys / currentMeasureCount);
            const avgDia = Math.round(totalDia / currentMeasureCount);
            const avgPulse = Math.round(totalPulse / currentMeasureCount);
            
            const activeTags = [];
            document.querySelectorAll('.tag-btn.active-tag').forEach(btn => activeTags.push(btn.innerText));
            if (currentMeasureCount > 1) {
                let modeTag = `📊 ${currentMeasureCount}次平均`;
                if(currentTheme === 'god') modeTag = `🪶 玄女合盤`;
                if(currentTheme === 'corp') modeTag = `💼 壓力整合`;
                if(currentTheme === 'cyber') modeTag = `⚡ 3軌同步`;
                activeTags.push(modeTag);
            }

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                sys: avgSys,
                dia: avgDia,
                pulse: avgPulse,
                tags: activeTags.join(' '),
                details: detailRecords
            };

            bpData.unshift(newRecord);
            localStorage.setItem('bpRecords', JSON.stringify(bpData));

            interactPet(avgSys, avgDia);
            updateUI();
        });

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                arrow.innerText = '🔼';
            } else {
                el.classList.add('hidden');
                arrow.innerText = '🔽 細節';
            }
        }

        function interactPet(sys, dia) {
            const avatar = document.getElementById('petAvatar');
            const speech = document.getElementById('petSpeech');
            const card = document.getElementById('petCard');
            const dict = langDict[currentTheme];

            if (sys < 120 && dia < 80) {
                card.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️✨" : (currentTheme === 'cyber' ? "🤖🌌" : "🧑‍⚕️💚");
                speech.innerText = dict.normalAdvice;
            } else if (sys >= 140 || dia >= 90) {
                card.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                avatar.innerText = currentTheme === 'god' ? "👹🛑" : (currentTheme === 'cyber' ? "🚨⚡" : "🩺⚠️");
                speech.innerText = dict.highAdvice;
            } else {
                card.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️🌀" : (currentTheme === 'cyber' ? "🤖🌀" : "📊🟡");
                speech.innerText = dict.lowAdvice;
            }
        }

        function updateUI() {
            const dict = langDict[currentTheme];
            
            document.body.style.background = dict.bodyBg;
            document.body.style.backgroundAttachment = "fixed";
            document.body.style.color = dict.textColor;

            const cards = document.querySelectorAll('.app-bubble-card');
            cards.forEach(el => {
                el.style.backgroundColor = dict.cardStyle;
            });

            document.getElementById('app-title').innerText = dict.appTitle;
            document.getElementById('app-subtitle').innerText = dict.appSubtitle;
            document.getElementById('app-icon').innerText = dict.icon;
            document.getElementById('app-icon').className = `w-10 h-10 rounded-2xl flex items-center justify-center text-xl bg-gradient-to-tr ${dict.iconBg} text-white`;
            
            document.getElementById('fortuneTitle').innerText = dict.fortuneTitle;
            document.getElementById('fortuneDot').innerText = dict.fortuneDot;
            document.getElementById('fortuneBgIcon').innerText = dict.fortuneBgIcon;

            document.getElementById('form-title').innerText = dict.formTitle;
            document.getElementById('lbl-mood-title').innerText = dict.moodTitle;
            document.getElementById('customTagInput').placeholder = dict.customPlaceholder;
            document.getElementById('custom-tag-btn').innerText = dict.customBtn;
            
            document.getElementById('submit-btn').innerText = dict.submitBtn;
            document.getElementById('submit-btn').className = `w-full bg-gradient-to-r ${dict.submitBtnBg} text-white font-extrabold py-4 rounded-2xl active:scale-[0.97] hover:opacity-95 transition-all text-sm mt-3 tracking-wide duration-200 cursor-pointer border border-white/20 shadow-md`;
            
            document.getElementById('chart-title').innerText = dict.chartTitle;
            document.getElementById('history-title').innerText = dict.historyTitle;
            document.getElementById('export-btn').innerText = dict.exportBtn;
            document.getElementById('clear-btn').innerText = dict.clearBtn;
            document.getElementById('petName').innerText = dict.petName;

            if (bpData.length > 0) {
                interactPet(bpData[0].sys, bpData[0].dia);
            } else {
                document.getElementById('petCard').style.borderColor = 'rgba(0,0,0,0.03)';
                document.getElementById('petAvatar').innerText = dict.petAvatar;
                document.getElementById('petSpeech').innerText = dict.petSpeech;
            }

            renderTags();
            setMeasureCount(currentMeasureCount);

            const listContainer = document.getElementById('historyList');
            if (bpData.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-400 py-8 text-xs">${dict.emptyText}</p>`;
            } else {
                listContainer.innerHTML = bpData.map(r => {
                    let detailsHtml = '';
                    if (r.details && r.details.length > 1) {
                        detailsHtml = `<div id="detail-${r.id}" class="hidden mt-2.5 p-3.5 bg-pink-50/30 rounded-2xl text-[12px] text-gray-600 space-y-2 border border-pink-100/50 shadow-inner">`;
                        r.details.forEach((d, idx) => {
                            let prefix = `第 ${idx+1} 次量測`;
                            if (r.details.length === 3) {
                                if (currentTheme === 'god') {
                                    if (idx === 0) prefix = '🔮 800英呎處';
                                    if (idx === 1) prefix = '🔮 500英呎處';
                                    if (idx === 2) prefix = '🔮 中華路降肉';
                                } else if (currentTheme === 'corp') {
                                    if (idx === 0) prefix = '💼 進公司初檢';
                                    if (idx === 1) prefix = '💼 開會後耐壓';
                                    if (idx === 2) prefix = '💼 主管痛釘點';
                                } else if (currentTheme === 'cyber') {
                                    if (idx === 0) prefix = '⚡ 一軌初描';
                                    if (idx === 1) prefix = '⚡ 二軌複查';
                                    if (idx === 2) prefix = '⚡ 核心合盤';
                                }
                            }
                            detailsHtml += `<p class="flex justify-between"><span>${prefix}</span><span class="font-bold text-gray-800">高壓 ${d.sys} / 低壓 ${d.dia} / 心率 ${d.pulse}</span></p>`;
                        });
                        detailsHtml += `</div>`;
                    }

                    return `
                        <div class="py-4 transition-all">
                            <div class="flex justify-between items-center">
                                <div onclick="${r.details && r.details.length > 1 ? `toggleDetail(${r.id})` : ''}" class="cursor-pointer flex-1 pr-4">
                                    <div class="flex items-center gap-2">
                                        <p class="text-[11px] text-gray-400 font-bold tracking-tight">${r.date}</p>
                                        ${r.details && r.details.length > 1 ? `<span id="arrow-${r.id}" class="text-[10px] bg-pink-50 text-pink-600 px-2 py-0.5 rounded-lg font-bold border border-pink-200/40 active:scale-95 transition-all">🔽 細節</span>` : ''}
                                    </div>
                                    <p class="text-xs font-extrabold text-pink-500 mt-1.5 tracking-wide">${r.tags || '🐾 日常追蹤'}</p>
                                </div>
                                <div class="text-right flex items-center gap-2">
                                    <div class="bg-pink-50/50 px-3.5 py-1.5 rounded-2xl border border-pink-100/60 shadow-sm">
                                        <span class="font-extrabold text-pink-500 text-base tracking-tight">${r.sys}</span>
                                        <span class="text-pink-300 text-xs mx-0.5">/</span>
                                        <span class="font-extrabold text-cyan-500 text-base tracking-tight">${r.dia}</span>
                                    </div>
                                    <span class="text-xs text-amber-500 font-extrabold w-12 text-center flex items-center justify-center gap-0.5">❤️${r.pulse}</span>
                                </div>
                            </div>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
            }

            const chartData = [...bpData].slice(0, 7).reverse();
            const labels = chartData.map(r => r.date.split(' ')[0]);
            const sysValues = chartData.map(r => r.sys);
            const diaValues = chartData.map(r => r.dia);

            if (bpChart) bpChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            let themeHighColor = '#f43f5e';
            let themeLowColor = '#06b6d4';
            
            if(currentTheme === 'cyber') { themeHighColor = '#d946ef'; themeLowColor = '#8b5cf6'; }
            if(currentTheme === 'corp') { themeHighColor = '#10b981'; themeLowColor = '#f59e0b'; }
            if(currentTheme === 'god') { themeHighColor = '#ec4899'; themeLowColor = '#a855f7'; }

            bpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: dict.chartLabel1, data: sysValues, borderColor: themeHighColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 4, pointRadius: 4, pointBackgroundColor: themeHighColor },
                        { label: dict.chartLabel2, data: diaValues, borderColor: themeLowColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 4, pointRadius: 4, pointBackgroundColor: themeLowColor }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { boxWidth: 8, color: '#4a5568', font: { size: 11, weight: '700' } } } 
                    },
                    scales: { 
                        y: { ticks: { color: '#718096', font: { size: 10, weight: '700' } }, grid: { color: 'rgba(244,63,94,0.04)' } }, 
                        x: { ticks: { color: '#718096', font: { size: 10, weight: '700' } }, grid: { display: false } } 
                    }
                }
            });
        }

        function exportCSV() {
            if(bpData.length === 0) return alert('沒有歷史紀錄可以匯出檔案唷');
            let csvContent = "\uFEFF日期時間,平均高壓,平均低壓,平均心跳,標籤狀態,詳細各次紀錄\n";
            bpData.forEach(r => { 
                let detailsStr = '';
                if(r.details) {
                    detailsStr = r.details.map((d, i) => `[第${i+1}次:${d.sys}/${d.dia}/${d.pulse}]`).join(' ');
                }
                csvContent += `${r.date},${r.sys},${r.dia},${r.pulse},${r.tags},${detailsStr}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `血壓日記_多巴胺青春版_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearData() {
            if (confirm(langDict[currentTheme].confirmClear)) {
                bpData = [];
                localStorage.removeItem('bpRecords');
                updateUI();
            }
        }

        window.onload = () => {
            updateUI();
        };
    </script>
</body>
</html>
