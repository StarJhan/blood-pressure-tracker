            updateUI();
        }

        // 動態生成輸入框
        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            let html = '';
            const dict = langDict[currentTheme];

            for (let i = 1; i <= currentMeasureCount; i++) {
                let labelPrefix = '';
                if (currentMeasureCount === 3) {
                    if (currentTheme === 'god') {
                        if (i === 1) labelPrefix = '【800英呎】';
                        if (i === 2) labelPrefix = '【500英呎】';
                        if (i === 3) labelPrefix = '【 降肉！】';
                    } else if (currentTheme === 'corp') {
                        if (i === 1) labelPrefix = '【剛進公司】';
                        if (i === 2) labelPrefix = '【剛開完會】';
                        if (i === 3) labelPrefix = '【被主管釘】';
                    } else if (currentTheme === 'cyber') {
                        if (i === 1) labelPrefix = '【核心初檢】';
                        if (i === 2) labelPrefix = '【二軌複查】';
                        if (i === 3) labelPrefix = '【效能合盤】';
                    } else {
                        labelPrefix = `【第 ${i} 次量測】`;
                    }
                } else if (currentMeasureCount === 2) {
                    labelPrefix = `${dict.detailPrefix} ${i} - `;
                } else {
                    labelPrefix = currentTheme === 'god' ? '【即刻降肉】' : (currentTheme === 'cyber' ? '【主線掃描】' : '【單次量測】');
                }

                html += `
                    <div class="bg-[#2a2a2a] p-3 rounded-2xl border border-gray-800">
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}高壓</label>
                                <input type="number" inputmode="numeric" id="sys_${i}" required placeholder="mmHg" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}低壓</label>
                                <input type="number" inputmode="numeric" id="dia_${i}" required placeholder="mmHg" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}心跳</label>
                                <input type="number" inputmode="numeric" id="pulse_${i}" required placeholder="bpm" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-gray-500">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function setMeasureCount(count) {
            currentMeasureCount = count;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btnCount${i}`);
                if (i === count) {
                    btn.className = "text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-gray-600 text-white shadow-sm";
                } else {
                    btn.className = "text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-[#1a1a1a] text-gray-400 shadow-sm";
                }
            }
            renderInputs();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const tags = langDict[currentTheme].tags;
            container.innerHTML = tags.map(tag => `
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">${tag}</button>
            `).join('');
        }

        function toggleTag(btn) {
            if (btn.classList.contains('bg-orange-500') || btn.classList.contains('bg-fuchsia-600')) {
                btn.className = "tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all";
            } else {
                const highlightClass = currentTheme === 'cyber' ? "bg-fuchsia-600 text-white" : "bg-orange-500 text-white";
                btn.className = `tag-btn ${highlightClass} text-xs px-3 py-2 rounded-xl border-transparent shadow-sm font-bold transition-all`;
            }
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const text = input.value.trim();
            if (!text) return;

            const tagText = text.startsWith('#') ? text : '#' + text;
            const container = document.getElementById('tagContainer');
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.onclick = function() { toggleTag(this); };
            
            const highlightClass = currentTheme === 'cyber' ? "bg-fuchsia-600 border-fuchsia-600" : "bg-purple-600 border-purple-600";
            newBtn.className = `tag-btn ${highlightClass} text-white text-xs px-3 py-2 rounded-xl shadow-sm font-bold transition-all`;
            newBtn.innerText = tagText;

            container.appendChild(newBtn);
            input.value = '';
        }

        document.getElementById('bpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let totalSys = 0, totalDia = 0, totalPulse = 0;
            let detailRecords = [];

            for (let i = 1; i <= currentMeasureCount; i++) {
                const sys = parseInt(document.getElementById(`sys_${i}`).value);
                const dia = parseInt(document.getElementById(`dia_${i}`).value);
                const pulse = parseInt(document.getElementById(`pulse_${i}`).value);
                
                totalSys += sys;
                totalDia += dia; 
                totalPulse += pulse;

                detailRecords.push({ sys, dia, pulse });
            }

            const avgSys = Math.round(totalSys / currentMeasureCount);
            const avgDia = Math.round(totalDia / currentMeasureCount);
            const avgPulse = Math.round(totalPulse / currentMeasureCount);
            
            const activeTags = [];
            document.querySelectorAll('.tag-btn.bg-orange-500, .tag-btn.bg-purple-600, .tag-btn.bg-fuchsia-600').forEach(btn => activeTags.push(btn.innerText));
            if (currentMeasureCount > 1) {
                let modeTag = `📊 ${currentMeasureCount}次平均`;
                if(currentTheme === 'god') modeTag = `🪶 九天玄女合盤`;
                if(currentTheme === 'corp') modeTag = `💼 壓力整合報告`;
                if(currentTheme === 'cyber') modeTag = `⚡ 3軌數據流同步`;
                activeTags.push(modeTag);
            }

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                sys: avgSys,
                dia: avgDia,
                pulse: avgPulse,
                tags: activeTags.join(' '),
                details: detailRecords
            };

            bpData.unshift(newRecord);
            localStorage.setItem('bpRecords', JSON.stringify(bpData));

            interactPet(avgSys, avgDia);
            updateUI();
        });

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                arrow.innerText = '🔼';
            } else {
                el.classList.add('hidden');
                arrow.innerText = '🔽';
            }
        }

        function interactPet(sys, dia) {
            const avatar = document.getElementById('petAvatar');
            const speech = document.getElementById('petSpeech');
            const card = document.getElementById('petCard');
            const dict = langDict[currentTheme];

            // 根據不同主題渲染對應邊框
            if (sys < 120 && dia < 80) {
                card.className = `${currentTheme==='cyber'?'bg-fuchsia-950/20 border-fuchsia-500/50':'bg-emerald-950/40 border-emerald-500/30'} p-4 rounded-[2rem] shadow-sm border-2 text-center transition-all duration-300`;
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️ 🔮 ✨" : (currentTheme === 'cyber' ? "🤖 🟢 🌌" : "🧑‍⚕️ 💚 📈");
                speech.innerText = dict.normalAdvice;
            } else if (sys >= 140 || dia >= 90) {
                card.className = `${currentTheme==='cyber'?'bg-fuchsia-950/20 border-red-500/50':'bg-rose-950/40 border-rose-500/30'} p-4 rounded-[2rem] shadow-sm border-2 text-center transition-all duration-300`;
                avatar.innerText = currentTheme === 'god' ? "👹 🛑 ⚡" : (currentTheme === 'cyber' ? "🚨 🛑 ⚡" : "🩺 ⚠️ 🛑");
                speech.innerText = dict.highAdvice;
            } else {
                card.className = `${currentTheme==='cyber'?'bg-fuchsia-950/20 border-amber-500/50':'bg-amber-950/40 border-amber-500/30'} p-4 rounded-[2rem] shadow-sm border-2 text-center transition-all duration-300`;
                avatar.innerText = currentTheme === 'god' ? "🤨 💦 🌀" : (currentTheme === 'cyber' ? "🤖 🟡 🌀" : "📊 🟡 🌀");
                speech.innerText = dict.lowAdvice;
            }
        }

        function updateUI() {
            const dict = langDict[currentTheme];
            
            // 頂部導航
            const nav = document.getElementById('navBar');
            nav.className = `${dict.navBg} ${dict.navBorder} pt-12 pb-6 px-4 shadow-sm rounded-b-[2rem] sticky top-0 z-50 flex items-center justify-between`;
            document.getElementById('app-title').innerHTML = dict.appTitle;
            document.getElementById('app-title').className = `text-xl font-bold tracking-wide flex items-center gap-2 pl-2 ${dict.themeText}`;
            
            // 籤詩卡片
            const fCard = document.getElementById('fortuneCard');
            fCard.className = `${dict.cardStyle} ${dict.fortuneBorder} p-3 rounded-2xl shadow-sm text-center`;
            document.getElementById('fortuneTitle').className = `text-xs font-bold ${dict.titleColor}`;
            document.getElementById('fortuneTitle').innerText = dict.fortuneTitle;
            document.getElementById('fortuneText').className = `text-xs ${dict.fortuneTextColor} mt-1 font-medium`;

            // 表單與卡片整體更新
            document.getElementById('formCard').className = `${dict.cardStyle} p-5 rounded-[2rem] shadow-sm`;
            document.getElementById('chartCard').className = `${dict.cardStyle} p-4 rounded-[2rem] shadow-sm`;
            document.getElementById('historyCard').className = `${dict.cardStyle} p-5 rounded-[2rem] shadow-sm`;

            document.getElementById('form-title').className = `text-base font-bold ${dict.formTitleColor} mb-3 flex items-center gap-1.5`;
            document.getElementById('form-title').innerText = dict.formTitle;
            document.getElementById('lbl-count-title').innerText = dict.countTitle;
            document.getElementById('btnCount1').innerText = dict.countBtn1;
            document.getElementById('btnCount2').innerText = dict.countBtn2;
            document.getElementById('btnCount3').innerText = dict.countBtn3;
            document.getElementById('lbl-mood-title').innerText = dict.moodTitle;
            document.getElementById('customTagInput').placeholder = dict.customPlaceholder;
            document.getElementById('custom-tag-btn').innerText = dict.customBtn;
            document.getElementById('submit-btn').innerText = dict.submitBtn;
            document.getElementById('chart-title').className = `text-base font-bold ${dict.titleColor} mb-3 flex items-center gap-1`;
            document.getElementById('chart-title').innerText = dict.chartTitle;
            document.getElementById('history-title').className = `text-base font-bold ${dict.titleColor} flex items-center gap-1`;
            document.getElementById('history-title').innerText = dict.historyTitle;
            document.getElementById('export-btn').innerText = dict.exportBtn;
            document.getElementById('clear-btn').innerText = dict.clearBtn;
            document.getElementById('petName').className = `text-xs font-bold ${dict.titleColor} mb-0.5`;
            document.getElementById('petName').innerText = dict.petName;

            if (bpData.length > 0) {
                interactPet(bpData[0].sys, bpData[0].dia);
            } else {
                document.getElementById('petCard').className = `${dict.cardStyle} p-4 rounded-[2rem] shadow-sm text-center`;
                document.getElementById('petAvatar').innerText = dict.petAvatar;
                document.getElementById('petSpeech').innerText = dict.petSpeech;
            }

            renderTags();
            setMeasureCount(currentMeasureCount);

            // 歷史清單渲染
            const listContainer = document.getElementById('historyList');
            if (bpData.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-500 py-6 text-xs">${dict.emptyText}</p>`;
            } else {
                listContainer.innerHTML = bpData.map(r => {
                    let detailsHtml = '';
                    if (r.details && r.details.length > 1) {
                        detailsHtml = `<div id="detail-${r.id}" class="hidden mt-1.5 p-2 bg-[#2a2a2a] rounded-xl text-[11px] text-gray-400 space-y-0.5 border border-gray-800">`;
                        r.details.forEach((d, idx) => {
                            let prefix = '';
                            if (r.details.length === 3) {
                                if (currentTheme === 'god') {
                                    if (idx === 0) prefix = '800英呎';
                                    if (idx === 1) prefix = '500英呎';
                                    if (idx === 2) prefix = '中華路降肉';
                                } else if (currentTheme === 'corp') {
                                    if (idx === 0) prefix = '進公司初檢';
                                    if (idx === 1) prefix = '開會後耐壓';
                                    if (idx === 2) prefix = '主管痛釘點';
                                } else if (currentTheme === 'cyber') {
                                    if (idx === 0) prefix = '一軌初掃';
                                    if (idx === 1) prefix = '二軌複查';
                                    if (idx === 2) prefix = '核心合盤';
                                } else {
                                    prefix = `第 ${idx+1} 次量測`;
                                }
                            } else {
                                prefix = `第 ${idx+1} 次`;
                            }
                            detailsHtml += `<p>${prefix}：高壓 <span class="font-bold text-orange-400">${d.sys}</span> / 低壓 <span class="font-bold text-orange-400">${d.dia}</span> / 心跳 <span class="font-bold text-orange-400">${d.pulse}</span></p>`;
                        });
                        detailsHtml += `</div>`;
                    }

                    return `
                        <div class="py-3 divide-y divide-transparent">
                            <div class="flex justify-between items-center text-sm">
                                <div onclick="${r.details && r.details.length > 1 ? `toggleDetail(${r.id})` : ''}" class="cursor-pointer">
                                    <p class="text-[10px] text-gray-500 font-bold flex items-center gap-1">
                                        ${r.date} ${r.details && r.details.length > 1 ? `<span id="arrow-${r.id}" class="text-[9px]">🔽 ${dict.detailArrow.split(' ')[1]}</span>` : ''}
                                    </p>
                                    <p class="text-[11px] text-amber-500 font-bold mt-0.5">${r.tags || '🐾 日常紀錄'}</p>
                                </div>
                                <div class="text-right">
                                    <span class="font-bold text-gray-200 text-base bg-[#2a2a2a] px-2 py-0.5 rounded-xl border border-gray-800">${r.sys}/${r.dia}</span>
                                    <span class="text-xs text-gray-500 ml-1">💓 ${r.pulse}</span>
                                </div>
                            </div>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
            }

            // 更新折線圖
            const chartData = [...bpData].slice(0, 7).reverse();
            const labels = chartData.map(r => r.date.split(' ')[0]);
            const sysValues = chartData.map(r => r.sys);
            const diaValues = chartData.map(r => r.dia);

            if (bpChart) bpChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            
            // 賽博版用粉綠配，其餘用紅藍配
            const highColor = currentTheme === 'cyber' ? '#d946ef' : '#f87171';
            const lowColor = currentTheme === 'cyber' ? '#22c55e' : '#60a5fa';

            bpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: dict.chartLabel1, data: sysValues, borderColor: highColor, backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointBackgroundColor: highColor },
                        { label: dict.chartLabel2, data: diaValues, borderColor: lowColor, backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointBackgroundColor: lowColor }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { boxWidth: 8, color: '#9ca3af', font: { size: 10, weight: 'bold' } } } 
                    },
                    scales: { 
                        y: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { color: '#2a2a2a' } }, 
                        x: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { display: false } } 
                    }
                }
            });
        }

        function exportCSV() {
            if(bpData.length === 0) return alert('沒有歷史紀錄可以匯出檔案唷');
            let csvContent = "\uFEFF日期時間,平均高壓,平均低壓,平均心跳,標籤狀態,詳細各次紀錄\n";
            bpData.forEach(r => { 
                let detailsStr = '';
                if(r.details) {
                    detailsStr = r.details.map((d, i) => `[第${i+1}次:${d.sys}/${d.dia}/${d.pulse}]`).join(' ');
                }
                csvContent += `${r.date},${r.sys},${r.dia},${r.pulse},${r.tags},${detailsStr}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `血壓健康足跡報告_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearData() {
            if (confirm('確定要清空所有儲存的歷史血壓量測紀錄嗎？🥺')) {
                bpData = [];
                localStorage.removeItem('bpRecords');
                updateUI();
            }
        }

        window.onload = () => {
            updateUI();
        };
    </script>
</body>
</html>
