<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的血壓小日記</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="血壓日記">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Noto Sans TC', sans-serif;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#121212] text-gray-200 antialiased pb-10">

    <!-- 頂部導航 -->
    <div class="bg-amber-600 text-white pt-12 pb-6 px-4 text-center shadow-sm rounded-b-[2rem] sticky top-0 z-50">
        <h1 class="text-2xl font-bold tracking-wide flex items-center justify-center gap-2">
            <span>🔮</span> 降肉大師 · 健康算命攤
        </h1>
    </div>

    <div class="max-w-md mx-auto px-4 mt-4 space-y-5">
        
        <!-- 今日健康小籤詩 -->
        <div class="bg-[#1e1e1e] border-2 border-dashed border-amber-500/50 p-3 rounded-2xl shadow-sm text-center">
            <p class="text-xs font-bold text-amber-400">☯️ 本日健康開運籤詩 ☯️</p>
            <p id="fortuneText" class="text-xs text-amber-200/80 mt-1 font-medium">正在感應天地靈氣...</p>
        </div>

        <!-- 算命大師互動區 -->
        <div id="petCard" class="bg-[#1e1e1e] p-4 rounded-[2rem] shadow-sm border-2 border-amber-500/30 text-center transition-all duration-300">
            <div id="petAvatar" class="text-5xl animate-bounce duration-1000">🧙‍♂️</div>
            <div class="bg-[#2a2a2a] rounded-2xl p-3 mt-3 border border-gray-800">
                <p id="petName" class="text-xs font-bold text-amber-400 mb-0.5">命理健康大師 · 降肉</p>
                <p id="petSpeech" class="text-xs text-gray-300 font-medium">看你面帶紅光，是不是剛剛偷跑去跟人家吵架？伸出雙臂讓本大師幫你的血管掐指一算！</p>
            </div>
        </div>

        <!-- 數據輸入表單 -->
        <div class="bg-[#1e1e1e] p-5 rounded-[2rem] shadow-sm border-2 border-orange-500/20">
            <h2 class="text-base font-bold text-orange-400 mb-3 flex items-center gap-1.5">📝 輸入本次量測數據</h2>
            
            <!-- 次數選擇切換紐 -->
            <div class="flex items-center justify-between bg-[#2a2a2a] p-1.5 rounded-xl mb-4 border border-gray-800">
                <span class="text-xs font-bold text-orange-400 pl-2">本座要呼喚幾英呎：</span>
                <div class="flex space-x-1">
                    <button type="button" onclick="setMeasureCount(1)" id="btnCount1" class="text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-[#1a1a1a] text-gray-400 shadow-sm">直接降肉</button>
                    <button type="button" onclick="setMeasureCount(2)" id="btnCount2" class="text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-[#1a1a1a] text-gray-400 shadow-sm">量2次</button>
                    <button type="button" onclick="setMeasureCount(3)" id="btnCount3" class="text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-amber-600 text-white shadow-sm">800英呎聖筊平均</button>
                </div>
            </div>

            <form id="bpForm" class="space-y-4">
                
                <!-- 數據輸入區容器 -->
                <div id="inputsContainer" class="space-y-3">
                    <!-- 動態載入 -->
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-1 pl-1">今日凡間心情狀態</label>
                    <div class="flex flex-wrap gap-2 mt-1" id="tagContainer">
                        <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">☀️ 剛睡醒清醒</button>
                        <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">🌙 準備躺平</button>
                        <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">💊 已服仙丹</button>
                        <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">☕ 注入咖啡因</button>
                        <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">🌀 靈魂出竅中</button>
                    </div>
                    
                    <div class="flex gap-2 mt-3">
                        <input type="text" id="customTagInput" placeholder="輸入自訂業障（如：主管碎念）" 
                            class="flex-1 bg-[#2a2a2a] border border-gray-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-purple-500 text-white placeholder-gray-500">
                        <button type="button" onclick="addCustomTag()" 
                            class="bg-purple-600 text-white font-bold text-xs px-4 py-2 rounded-xl active:scale-[0.95] transition-all">
                            ＋開運符
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-amber-600 text-white font-bold py-3.5 rounded-2xl shadow-md hover:bg-amber-700 active:scale-[0.97] transition-all text-sm mt-2 tracking-wider">
                    ☯️ 恭請九天玄女開示 ☯️
                </button>
            </form>
        </div>

        <!-- 趨勢圖表 -->
        <div class="bg-[#1e1e1e] p-4 rounded-[2rem] shadow-sm border-2 border-blue-500/10">
            <h2 class="text-base font-bold text-blue-400 mb-3 flex items-center gap-1">📊 血管風水波浪圖</h2>
            <div class="relative w-full h-44">
                <canvas id="bpChart"></canvas>
            </div>
        </div>

        <!-- 歷史數據清單 -->
        <div class="bg-[#1e1e1e] p-5 rounded-[2rem] shadow-sm border-2 border-purple-500/10">
            <div class="flex justify-between items-center mb-3">
                <h2 class="text-base font-bold text-purple-400 flex items-center gap-1">📜 歷史健康功功德簿</h2>
                <div class="flex space-x-1.5">
                    <button onclick="exportCSV()" class="text-xs font-bold text-amber-400 bg-amber-500/10 px-2.5 py-1 rounded-xl border border-amber-500/20">外傳CSV</button>
                    <button onclick="clearData()" class="text-xs font-bold text-gray-400 bg-gray-500/10 px-2.5 py-1 rounded-xl border border-gray-800">渡化清空</button>
                </div>
            </div>
            <div class="flow-root max-h-64 overflow-y-auto divide-y divide-gray-800" id="historyList">
                <p class="text-center text-gray-500 py-6 text-xs">功德簿空空如也～</p>
            </div>
        </div>
    </div>

    <script>
        let bpData = JSON.parse(localStorage.getItem('bpRecords')) || [];
        let bpChart = null;
        let currentMeasureCount = 3;

        const fortunes = [
            "大吉 🌟 血管天庭飽滿！氣血順暢得像溜滑梯，今日宜吃大餐犒賞自己！",
            "中吉 ☕ 量血壓前與咖啡保持三十步距離，方能避開數字調皮之災。",
            "小吉 🦶 大師開示：量測時雙腳平放不交叉，好運自然降肉！",
            "上上簽 🍦 心情愉悅則百病不侵，今天對鏡子裡的自己微笑三次可開運。",
            "平安 💧 今日多喝無根水（溫開水），讓脈搏隨著微風低調打節拍。",
            "小吉 🛌 昨晚睡得飽，血管沒煩惱！今晚子時（11點）前宜躺平就寢。"
        ];

        document.getElementById('fortuneText').innerText = fortunes[Math.floor(Math.random() * fortunes.length)];

        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            let html = '';
            for (let i = 1; i <= currentMeasureCount; i++) {
                let labelPrefix = '';
                if (currentMeasureCount === 3) {
                    if (i === 1) labelPrefix = '【800英呎】';
                    if (i === 2) labelPrefix = '【500英呎】';
                    if (i === 3) labelPrefix = '【 降肉！】';
                } else if (currentMeasureCount === 2) {
                    labelPrefix = `第 ${i} 次 - `;
                } else {
                    labelPrefix = '【即刻降肉】';
                }

                html += `
                    <div class="bg-[#2a2a2a] p-3 rounded-2xl border border-orange-500/10">
                        <div class="grid grid-cols-3 gap-2">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}高壓</label>
                                <input type="number" inputmode="numeric" id="sys_${i}" required placeholder="mmHg" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-orange-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}低壓</label>
                                <input type="number" inputmode="numeric" id="dia_${i}" required placeholder="mmHg" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-orange-500">
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 mb-0.5 text-center">${labelPrefix}心跳</label>
                                <input type="number" inputmode="numeric" id="pulse_${i}" required placeholder="bpm" 
                                    class="w-full bg-[#1e1e1e] border border-gray-800 rounded-xl p-2 text-center text-base font-bold text-orange-400 focus:outline-none focus:border-orange-500">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function setMeasureCount(count) {
            currentMeasureCount = count;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btnCount${i}`);
                if (i === count) {
                    btn.className = "text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-amber-600 text-white shadow-sm";
                } else {
                    btn.className = "text-xs px-2.5 py-1 rounded-lg font-bold transition-all bg-[#1a1a1a] text-gray-400 shadow-sm";
                }
            }
            renderInputs();
        }

        document.getElementById('bpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let totalSys = 0, totalDia = 0, totalPulse = 0;
            let detailRecords = [];

            for (let i = 1; i <= currentMeasureCount; i++) {
                const sys = parseInt(document.getElementById(`sys_${i}`).value);
                const dia = parseInt(document.getElementById(`dia_${i}`).value);
                const pulse = parseInt(document.getElementById(`pulse_${i}`).value);
                
                totalSys += sys;
                totalDia += dia; 
                totalPulse += pulse;

                detailRecords.push({ sys, dia, pulse });
            }

            const avgSys = Math.round(totalSys / currentMeasureCount);
            const avgDia = Math.round(totalDia / currentMeasureCount);
            const avgPulse = Math.round(totalPulse / currentMeasureCount);
            
            const activeTags = [];
            document.querySelectorAll('.tag-btn.bg-orange-500, .tag-btn.bg-purple-600').forEach(btn => activeTags.push(btn.innerText));
            if (currentMeasureCount > 1) activeTags.push(`🪶 九天玄女合盤`);

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                sys: avgSys,
                dia: avgDia,
                pulse: avgPulse,
                tags: activeTags.join(' '),
                details: detailRecords
            };

            bpData.unshift(newRecord);
            localStorage.setItem('bpRecords', JSON.stringify(bpData));

            interactPet(avgSys, avgDia);
            updateUI();
            
            document.getElementById('tagContainer').innerHTML = `
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all">☀️ 剛睡醒清醒</button>
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-200 transition-all">🌙 準備躺平</button>
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-200 transition-all">💊 已服仙丹</button>
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-200 transition-all">☕ 注入咖啡因</button>
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-200 transition-all">🌀 靈魂出竅中</button>
            `;
            setMeasureCount(currentMeasureCount);
        });

        function toggleTag(btn) {
            const isCustom = btn.classList.contains('border-purple-500/40') || btn.classList.contains('bg-purple-600');
            if (btn.classList.contains('bg-orange-500') || btn.classList.contains('bg-purple-600')) {
                btn.className = isCustom 
                    ? "tag-btn bg-purple-900/30 text-purple-400 text-xs px-3 py-2 rounded-xl border border-purple-500/40 transition-all"
                    : "tag-btn bg-[#2a2a2a] text-gray-300 text-xs px-3 py-2 rounded-xl border border-gray-800 transition-all";
            } else {
                btn.className = isCustom
                    ? "tag-btn bg-purple-600 text-white text-xs px-3 py-2 rounded-xl border-purple-600 shadow-sm font-bold transition-all"
                    : "tag-btn bg-orange-500 text-white text-xs px-3 py-2 rounded-xl border-orange-500 shadow-sm font-bold transition-all";
            }
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const text = input.value.trim();
            if (!text) return;

            const tagText = text.startsWith('#') ? text : '#' + text;
            const container = document.getElementById('tagContainer');
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.onclick = function() { toggleTag(this); };
            newBtn.className = "tag-btn bg-purple-600 text-white text-xs px-3 py-2 rounded-xl border-purple-600 shadow-sm font-bold transition-all";
            newBtn.innerText = tagText;

            container.appendChild(newBtn);
            input.value = '';
        }

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                arrow.innerText = '🔼';
            } else {
                el.classList.add('hidden');
                arrow.innerText = '🔽';
            }
        }

        function interactPet(sys, dia) {
            const avatar = document.getElementById('petAvatar');
            const speech = document.getElementById('petSpeech');
            const card = document.getElementById('petCard');

            if (sys < 120 && dia < 80) {
                card.className = "bg-emerald-950/40 p-4 rounded-[2rem] shadow-sm border-2 border-emerald-500/30 text-center transition-all duration-300";
                avatar.innerText = "🧙‍♂️ 🔮 ✨";
                speech.innerText = "善哉善哉！此等平均數據，血管格局宏大、百病不侵！大師鑑定：今日你是健康功德人！";
            } else if (sys >= 140 || dia >= 90) {
                card.className = "bg-rose-950/40 p-4 rounded-[2rem] shadow-sm border-2 border-rose-500/30 text-center transition-all duration-300";
                avatar.innerText = "👹 🛑 ⚡";
                speech.innerText = "大事不妙！血壓怪獸九天玄女降肉了！施主你這數字在發爐啊！快去旁邊靜坐10分鐘重測，切莫浮躁！";
            } else {
                card.className = "bg-amber-950/40 p-4 rounded-[2rem] shadow-sm border-2 border-amber-500/30 text-center transition-all duration-300";
                avatar.innerText = "🤨 💦 🌀";
                speech.innerText = "嗯...印堂微發黃，平均數值稍微有一點調皮逆天喔。最近是不是犯小人或凡間雜事太多？記得提早躺平！";
            }
        }

        function updateUI() {
            const listContainer = document.getElementById('historyList');
            if (bpData.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-gray-500 py-6 text-xs">功德簿空空如也～</p>';
            } else {
                listContainer.innerHTML = bpData.map(r => {
                    let detailsHtml = '';
                    if (r.details && r.details.length > 1) {
                        detailsHtml = `<div id="detail-${r.id}" class="hidden mt-1.5 p-2 bg-[#2a2a2a] rounded-xl text-[11px] text-gray-400 space-y-0.5 border border-gray-800">`;
                        r.details.forEach((d, idx) => {
                            let prefix = '';
                            if (r.details.length === 3) {
                                if (idx === 0) prefix = '800英呎';
                                if (idx === 1) prefix = '500英呎';
                                if (idx === 2) prefix = '中華路降肉';
                            } else {
                                prefix = `第 ${idx+1} 次`;
                            }
                            detailsHtml += `<p>${prefix}：高壓 <span class="font-bold text-orange-400">${d.sys}</span> / 低壓 <span class="font-bold text-orange-400">${d.dia}</span> / 心跳 <span class="font-bold text-orange-400">${d.pulse}</span></p>`;
                        });
                        detailsHtml += `</div>`;
                    }

                    return `
                        <div class="py-3 divide-y divide-transparent">
                            <div class="flex justify-between items-center text-sm">
                                <div onclick="${r.details && r.details.length > 1 ? `toggleDetail(${r.id})` : ''}" class="cursor-pointer">
                                    <p class="text-[10px] text-gray-500 font-bold flex items-center gap-1">
                                        ${r.date} ${r.details && r.details.length > 1 ? `<span id="arrow-${r.id}" class="text-[9px]">🔽 顯現各路英呎</span>` : ''}
                                    </p>
                                    <p class="text-[11px] text-amber-400 font-bold mt-0.5">${r.tags || '🐾 凡塵紀錄'}</p>
                                </div>
                                <div class="text-right">
                                    <span class="font-bold text-gray-200 text-base bg-[#2a2a2a] px-2 py-0.5 rounded-xl border border-gray-800">${r.sys}/${r.dia}</span>
                                    <span class="text-xs text-gray-500 ml-1">💓 ${r.pulse}</span>
                                </div>
                            </div>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
            }

            const chartData = [...bpData].slice(0, 7).reverse();
            const labels = chartData.map(r => r.date.split(' ')[0]);
            const sysValues = chartData.map(r => r.sys);
            const diaValues = chartData.map(r => r.dia);

            if (bpChart) bpChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            bpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '平均高壓', data: sysValues, borderColor: '#f87171', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointBackgroundColor: '#f87171' },
                        { label: '平均低壓', data: diaValues, borderColor: '#60a5fa', backgroundColor: 'transparent', tension: 0.3, borderWidth: 3, pointBackgroundColor: '#60a5fa' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { boxWidth: 8, color: '#9ca3af', font: { size: 10, weight: 'bold' } } } 
                    },
                    scales: { 
                        y: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { color: '#2a2a2a' } }, 
                        x: { ticks: { color: '#6b7280', font: { size: 9 } }, grid: { display: false } } 
                    }
                }
            });
        }

        function exportCSV() {
            if(bpData.length === 0) return alert('功德簿空無一物，無法外傳');
            let csvContent = "\uFEFF日期時間,平均高壓,平均低壓,平均心跳,心情標籤,詳細各次紀錄\n";
            bpData.forEach(r => { 
                let detailsStr = '';
                if(r.details) {
                    detailsStr = r.details.map((d, i) => `[第${i+1}次:${d.sys}/${d.dia}/${d.pulse}]`).join(' ');
                }
                csvContent += `${r.date},${r.sys},${r.dia},${r.pulse},${r.tags},${detailsStr}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `降肉大師功德簿_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearData() {
            if (confirm('確定要渡化清空所有好不容易存下來的健康功德紀錄嗎？🥺')) {
                bpData = [];
                localStorage.removeItem('bpRecords');
                document.getElementById('petCard').className = "bg-[#1e1e1e] p-4 rounded-[2rem] shadow-sm border-2 border-amber-500/30 text-center";
                document.getElementById('petAvatar').innerText = "🧙‍♂️";
                document.getElementById('petSpeech').innerText = "一切皆空～因果重來！今天起再重新累積功德吧！";
                updateUI();
            }
        }

        setMeasureCount(3);
    </script>
</body>
</html>
