<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <title>血壓日記 App Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
            user-select: none;
        }
        .app-glass {
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 柔和脈衝動畫 */
        @keyframes subtlePulse {
            0%, 100% { transform: scale(1); opacity: 0.95; }
            50% { transform: scale(1.02); opacity: 1; }
        }
        .pulse-effect { animation: subtlePulse 3s infinite ease-in-out; }
    </style>
</head>

        <div id="formCard" class="p-6 rounded-[2.5rem] app-glass border border-white/[0.06] shadow-xl">

            "微吉 🛌 昨晚睡得飽，血管沒煩惱！今晚宜提早強制登出休息。"
        ];

        document.getElementById('fortuneText').innerText = fortunesList[Math.floor(Math.random() * fortunesList.length)];

        function selectTheme(themeName) {
            currentTheme = themeName;
            updateUI();
        }

        function renderInputs() {
            const container = document.getElementById('inputsContainer');
            let html = '';
            const dict = langDict[currentTheme];

            for (let i = 1; i <= currentMeasureCount; i++) {
                let labelPrefix = '';
                if (currentMeasureCount === 3) {
                    if (currentTheme === 'god') {
                        if (i === 1) labelPrefix = '【800英呎】';
                        if (i === 2) labelPrefix = '【500英呎】';
                        if (i === 3) labelPrefix = '【 降肉！】';
                    } else if (currentTheme === 'corp') {
                        if (i === 1) labelPrefix = '【進公司初檢】';
                        if (i === 2) labelPrefix = '【開會後耐壓】';
                        if (i === 3) labelPrefix = '【主管痛釘點】';
                    } else if (currentTheme === 'cyber') {
                        if (i === 1) labelPrefix = '【一軌初掃】';
                        if (i === 2) labelPrefix = '【二軌複查】';
                        if (i === 3) labelPrefix = '【核心合盤】';
                    } else {
                        labelPrefix = `【第 ${i} 次量測】`;
                    }
                } else if (currentMeasureCount === 2) {
                    labelPrefix = `【量測 ${i}】`;
                } else {
                    labelPrefix = currentTheme === 'god' ? '【即刻降肉】' : (currentTheme === 'cyber' ? '【核心主線】' : '【單次數值】');
                }

                html += `
                    <div class="bg-black/30 p-4 rounded-2xl border border-white/[0.04] transition-all">
                        <p class="text-[10px] font-bold text-gray-400 mb-2 tracking-wide">${labelPrefix}</p>
                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-[9px] font-medium text-gray-500 mb-1 text-center">收縮壓 (高壓)</label>
                                <input type="number" inputmode="numeric" id="sys_${i}" required placeholder="mmHg" 
                                    class="w-full bg-black/40 border border-white/[0.06] rounded-xl py-2.5 text-center text-base font-bold text-rose-400 focus:outline-none focus:border-rose-500/40 transition-all">
                            </div>
                            <div>
                                <label class="block text-[9px] font-medium text-gray-500 mb-1 text-center">舒張壓 (低壓)</label>
                                <input type="number" inputmode="numeric" id="dia_${i}" required placeholder="mmHg" 
                                    class="w-full bg-black/40 border border-white/[0.06] rounded-xl py-2.5 text-center text-base font-bold text-cyan-400 focus:outline-none focus:border-cyan-500/40 transition-all">
                            </div>
                            <div>
                                <label class="block text-[9px] font-medium text-gray-500 mb-1 text-center">心率 (脈搏)</label>
                                <input type="number" inputmode="numeric" id="pulse_${i}" required placeholder="bpm" 
                                    class="w-full bg-black/40 border border-white/[0.06] rounded-xl py-2.5 text-center text-base font-bold text-emerald-400 focus:outline-none focus:border-emerald-500/40 transition-all">
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function setMeasureCount(count) {
            currentMeasureCount = count;
            for (let i = 1; i <= 3; i++) {
                const btn = document.getElementById(`btnCount${i}`);
                if (i === count) {
                    btn.className = "text-xs py-2 rounded-xl font-semibold transition-all bg-white/[0.12] text-white shadow-md";
                } else {
                    btn.className = "text-xs py-2 rounded-xl font-medium transition-all text-gray-500 hover:text-gray-300";
                }
            }
            renderInputs();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const tags = langDict[currentTheme].tags;
            container.innerHTML = tags.map(tag => `
                <button type="button" onclick="toggleTag(this)" class="tag-btn bg-white/[0.04] text-gray-300 text-xs px-3 py-1.5 rounded-xl border border-white/[0.04] transition-all whitespace-nowrap">${tag}</button>
            `).join('');
        }

        function toggleTag(btn) {
            if (btn.classList.contains('active-tag')) {
                btn.className = "tag-btn bg-white/[0.04] text-gray-300 text-xs px-3 py-1.5 rounded-xl border border-white/[0.04] transition-all whitespace-nowrap";
                btn.classList.remove('active-tag');
            } else {
                let activeStyle = "bg-gradient-to-r from-rose-500/20 to-orange-500/20 text-orange-400 border-orange-500/30";
                if(currentTheme === 'god') activeStyle = "bg-amber-500/20 text-amber-300 border-amber-500/40";
                if(currentTheme === 'medical') activeStyle = "bg-blue-500/20 text-blue-300 border-blue-500/40";
                if(currentTheme === 'corp') activeStyle = "bg-teal-500/20 text-teal-300 border-teal-500/40";
                if(currentTheme === 'cyber') activeStyle = "bg-purple-500/20 text-fuchsia-300 border-purple-500/40";

                btn.className = `tag-btn ${activeStyle} text-xs px-3 py-1.5 rounded-xl border font-semibold transition-all whitespace-nowrap active-tag`;
            }
        }

        function addCustomTag() {
            const input = document.getElementById('customTagInput');
            const text = input.value.trim();
            if (!text) return;

            const tagText = text.startsWith('#') ? text : '#' + text;
            const container = document.getElementById('tagContainer');
            const newBtn = document.createElement('button');
            newBtn.type = 'button';
            newBtn.onclick = function() { toggleTag(this); };
            
            let activeStyle = "bg-gradient-to-r from-rose-500/20 to-orange-500/20 text-orange-400 border-orange-500/30";
            newBtn.className = `tag-btn ${activeStyle} text-xs px-3 py-1.5 rounded-xl border font-semibold transition-all whitespace-nowrap active-tag`;
            newBtn.innerText = tagText;

            container.appendChild(newBtn);
            input.value = '';
        }

        document.getElementById('bpForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let totalSys = 0, totalDia = 0, totalPulse = 0;
            let detailRecords = [];

            for (let i = 1; i <= currentMeasureCount; i++) {
                const sys = parseInt(document.getElementById(`sys_${i}`).value);
                const dia = parseInt(document.getElementById(`dia_${i}`).value);
                const pulse = parseInt(document.getElementById(`pulse_${i}`).value);
                
                totalSys += sys;
                totalDia += dia; 
                totalPulse += pulse;

                detailRecords.push({ sys, dia, pulse });
            }

            const avgSys = Math.round(totalSys / currentMeasureCount);
            const avgDia = Math.round(totalDia / currentMeasureCount);
            const avgPulse = Math.round(totalPulse / currentMeasureCount);
            
            const activeTags = [];
            document.querySelectorAll('.tag-btn.active-tag').forEach(btn => activeTags.push(btn.innerText));
            if (currentMeasureCount > 1) {
                let modeTag = `📊 ${currentMeasureCount}次平均`;
                if(currentTheme === 'god') modeTag = `🪶 玄女合盤`;
                if(currentTheme === 'corp') modeTag = `💼 壓力整合`;
                if(currentTheme === 'cyber') modeTag = `⚡ 3軌同步`;
                activeTags.push(modeTag);
            }

            const newRecord = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                sys: avgSys,
                dia: avgDia,
                pulse: avgPulse,
                tags: activeTags.join(' '),
                details: detailRecords
            };

            bpData.unshift(newRecord);
            // 🛠️ 舊資料對齊：完美使用 bpRecords
            localStorage.setItem('bpRecords', JSON.stringify(bpData));

            interactPet(avgSys, avgDia);
            updateUI();
        });

        function toggleDetail(id) {
            const el = document.getElementById(`detail-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
                arrow.innerText = '🔼';
            } else {
                el.classList.add('hidden');
                arrow.innerText = '🔽';
            }
        }

        function interactPet(sys, dia) {
            const avatar = document.getElementById('petAvatar');
            const speech = document.getElementById('petSpeech');
            const card = document.getElementById('petCard');
            const dict = langDict[currentTheme];

            if (sys < 120 && dia < 80) {
                card.style.borderColor = 'rgba(16, 185, 129, 0.3)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️✨" : (currentTheme === 'cyber' ? "🤖🌌" : "🧑‍⚕️💚");
                speech.innerText = dict.normalAdvice;
            } else if (sys >= 140 || dia >= 90) {
                card.style.borderColor = 'rgba(239, 68, 68, 0.4)';
                avatar.innerText = currentTheme === 'god' ? "👹🛑" : (currentTheme === 'cyber' ? "🚨⚡" : "🩺⚠️");
                speech.innerText = dict.highAdvice;
            } else {
                card.style.borderColor = 'rgba(245, 158, 11, 0.3)';
                avatar.innerText = currentTheme === 'god' ? "🧙‍♂️🌀" : (currentTheme === 'cyber' ? "🤖🌀" : "📊🟡");
                speech.innerText = dict.lowAdvice;
            }
        }

        function updateUI() {
            const dict = langDict[currentTheme];
            
            // 全域毛玻璃背景色調更換
            const glasses = document.querySelectorAll('.app-glass');
            glasses.forEach(el => {
                el.style.backgroundColor = dict.glassStyle;
            });

            document.getElementById('app-title').innerText = dict.appTitle;
            document.getElementById('app-subtitle').innerText = dict.appSubtitle;
            document.getElementById('app-icon').innerText = dict.icon;
            document.getElementById('app-icon').className = `w-10 h-10 rounded-2xl flex items-center justify-center text-xl bg-gradient-to-tr ${dict.iconBg}`;
            
            document.getElementById('fortuneTitle').innerText = dict.fortuneTitle;
            document.getElementById('fortuneDot').innerText = dict.fortuneDot;
            document.getElementById('fortuneBgIcon').innerText = dict.fortuneBgIcon;

            document.getElementById('form-title').innerText = dict.formTitle;
            document.getElementById('lbl-mood-title').innerText = dict.moodTitle;
            document.getElementById('customTagInput').placeholder = dict.customPlaceholder;
            document.getElementById('custom-tag-btn').innerText = dict.customBtn;
            
            document.getElementById('submit-btn').innerText = dict.submitBtn;
            document.getElementById('submit-btn').className = `w-full bg-gradient-to-r ${dict.submitBtnBg} text-white font-bold py-4 rounded-2xl active:scale-[0.97] transition-all text-sm mt-3 tracking-wide`;
            
            document.getElementById('chart-title').innerText = dict.chartTitle;
            document.getElementById('history-title').innerText = dict.historyTitle;
            document.getElementById('export-btn').innerText = dict.exportBtn;
            document.getElementById('clear-btn').innerText = dict.clearBtn;
            document.getElementById('petName').innerText = dict.petName;

            if (bpData.length > 0) {
                interactPet(bpData[0].sys, bpData[0].dia);
            } else {
                document.getElementById('petCard').style.borderColor = 'rgba(255,255,255,0.06)';
                document.getElementById('petAvatar').innerText = dict.petAvatar;
                document.getElementById('petSpeech').innerText = dict.petSpeech;
            }

            renderTags();
            setMeasureCount(currentMeasureCount);

            // 歷史列表 App 化渲染
            const listContainer = document.getElementById('historyList');
            if (bpData.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-gray-500 py-8 text-xs">${dict.emptyText}</p>`;
            } else {
                listContainer.innerHTML = bpData.map(r => {
                    let detailsHtml = '';
                    if (r.details && r.details.length > 1) {
                        detailsHtml = `<div id="detail-${r.id}" class="hidden mt-2 p-3 bg-black/40 rounded-2xl text-[11px] text-gray-400 space-y-1.5 border border-white/[0.04]">`;
                        r.details.forEach((d, idx) => {
                            let prefix = `第 ${idx+1} 次量測`;
                            if (r.details.length === 3) {
                                if (currentTheme === 'god') {
                                    if (idx === 0) prefix = '🔮 800英呎處';
                                    if (idx === 1) prefix = '🔮 500英呎處';
                                    if (idx === 2) prefix = '🔮 中華路降肉';
                                } else if (currentTheme === 'corp') {
                                    if (idx === 0) prefix = '💼 進公司初檢';
                                    if (idx === 1) prefix = '💼 開會後耐壓';
                                    if (idx === 2) prefix = '💼 主管痛釘點';
                                } else if (currentTheme === 'cyber') {
                                    if (idx === 0) prefix = '⚡ 一軌初描';
                                    if (idx === 1) prefix = '⚡ 二軌複查';
                                    if (idx === 2) prefix = '⚡ 核心合盤';
                                }
                            }
                            detailsHtml += `<p class="flex justify-between"><span>${prefix}</span><span class="font-bold text-gray-300">高壓 ${d.sys} / 低壓 ${d.dia} / 心率 ${d.pulse}</span></p>`;
                        });
                        detailsHtml += `</div>`;
                    }

                    // 高級感卡片行設計
                    return `
                        <div class="py-3.5 transition-all">
                            <div class="flex justify-between items-center">
                                <div onclick="${r.details && r.details.length > 1 ? `toggleDetail(${r.id})` : ''}" class="cursor-pointer flex-1 pr-4">
                                    <div class="flex items-center gap-1.5">
                                        <p class="text-[10px] text-gray-500 font-bold tracking-tight">${r.date}</p>
                                        ${r.details && r.details.length > 1 ? `<span id="arrow-${r.id}" class="text-[9px] bg-white/5 px-1.5 py-0.5 rounded-md text-gray-400">🔽 細節</span>` : ''}
                                    </div>
                                    <p class="text-xs font-semibold text-orange-400/90 mt-1 tracking-wide">${r.tags || '🐾 日常追蹤'}</p>
                                </div>
                                <div class="text-right flex items-center gap-2">
                                    <div class="bg-white/[0.04] px-3 py-1.5 rounded-2xl border border-white/[0.05]">
                                        <span class="font-bold text-gray-100 text-sm tracking-tight">${r.sys}</span>
                                        <span class="text-gray-500 text-xs mx-0.5">/</span>
                                        <span class="font-bold text-gray-400 text-sm tracking-tight">${r.dia}</span>
                                    </div>
                                    <span class="text-xs text-gray-500 font-medium w-12 text-center">❤️${r.pulse}</span>
                                </div>
                            </div>
                            ${detailsHtml}
                        </div>
                    `;
                }).join('');
            }

            // Chart.js 上架色調校正
            const chartData = [...bpData].slice(0, 7).reverse();
            const labels = chartData.map(r => r.date.split(' ')[0]);
            const sysValues = chartData.map(r => r.sys);
            const diaValues = chartData.map(r => r.dia);

            if (bpChart) bpChart.destroy();

            const ctx = document.getElementById('bpChart').getContext('2d');
            let themeHighColor = '#ef4444';
            let themeLowColor = '#06b6d4';
            
            if(currentTheme === 'cyber') { themeHighColor = '#d946ef'; themeLowColor = '#a855f7'; }
            if(currentTheme === 'corp') { themeHighColor = '#f43f5e'; themeLowColor = '#14b8a6'; }
            if(currentTheme === 'god') { themeHighColor = '#f59e0b'; themeLowColor = '#ef4444'; }

            bpChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: dict.chartLabel1, data: sysValues, borderColor: themeHighColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 3, pointRadius: 2, pointBackgroundColor: themeHighColor },
                        { label: dict.chartLabel2, data: diaValues, borderColor: themeLowColor, backgroundColor: 'transparent', tension: 0.34, borderWidth: 3, pointRadius: 2, pointBackgroundColor: themeLowColor }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { labels: { boxWidth: 6, color: '#9ca3af', font: { size: 10, weight: '600' } } } 
                    },
                    scales: { 
                        y: { ticks: { color: '#4b5563', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.03)' } }, 
                        x: { ticks: { color: '#4b5563', font: { size: 9 } }, grid: { display: false } } 
                    }
                }
            });
        }

        function exportCSV() {
            if(bpData.length === 0) return alert('沒有歷史紀錄可以匯出檔案唷');
            let csvContent = "\uFEFF日期時間,平均高壓,平均低壓,平均心跳,標籤狀態,詳細各次紀錄\n";
            bpData.forEach(r => { 
                let detailsStr = '';
                if(r.details) {
                    detailsStr = r.details.map((d, i) => `[第${i+1}次:${d.sys}/${d.dia}/${d.pulse}]`).join(' ');
                }
                csvContent += `${r.date},${r.sys},${r.dia},${r.pulse},${r.tags},${detailsStr}\n`; 
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `血壓日記_上架備份_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearData() {
            if (confirm('確定要格式化清空所有歷史血壓紀錄嗎？🥺')) {
                bpData = [];
                localStorage.removeItem('bpRecords');
                updateUI();
            }
        }

        window.onload = () => {
            updateUI();
        };
    </script>
</body>
</html>
