<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BPTracker - 血壓日記大師</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            /* 九天玄女版 顏色 */
            --bg-god: #120c1f;
            --card-god: #1d1433;
            --accent-god: #ffd700;
            --text-god: #e1d7f0;
            --btn-god: #8a2be2;
            
            /* 專業醫療版 顏色 */
            --bg-med: #121824;
            --card-med: #1e293b;
            --accent-med: #38bdf8;
            --text-med: #f1f5f9;
            --btn-med: #0284c7;

            /* 預設為玄女版 */
            --bg: var(--bg-god);
            --card: var(--card-god);
            --accent: var(--accent-god);
            --text: var(--text-god);
            --btn: var(--btn-god);
        }

        /* 專業醫療版 樣式覆蓋 */
        body.theme-medical {
            --bg: var(--bg-med);
            --card: var(--card-med);
            --accent: var(--accent-med);
            --text: var(--text-med);
            --btn: var(--btn-med);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom) 16px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* 頂部導航與主題切換列 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
        }

        .theme-switch-btn {
            background-color: var(--card);
            color: var(--text);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* 大師/管理師對話框 */
        .master-box {
            background-color: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid var(--accent);
        }

        .master-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 6px;
        }

        .master-text {
            font-size: 15px;
            line-height: 1.4;
        }

        /* 表單區塊 */
        .form-card {
            background-color: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .input-group {
            flex: 1;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: rgba(255,255,255,0.7);
        }

        input, select {
            width: 100%;
            background-color: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--btn);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s;
        }

        /* 圖表區塊 */
        .chart-card {
            background-color: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        /* 歷史紀錄列表 */
        .history-card {
            background-color: var(--card);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 32px;
        }

        .history-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            color: var(--accent);
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .item-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .item-bp {
            font-size: 16px;
            font-weight: bold;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .pulse-badge {
            font-size: 13px;
            background-color: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 12px;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ff5b5b;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="app-title">🔮 九天玄女血壓算命攤</h1>
        <button class="theme-switch-btn" id="theme-btn" onclick="toggleTheme()">切換至 專業醫療版</button>
    </div>

    <div class="master-box">
        <div class="master-title" id="master-title">🛸 九天玄女開光開運開示</div>
        <div class="master-text" id="master-text">恭請九天玄女駕臨！快搯指量一下今日血壓，看是凡心浮躁（血壓高）還是仙氣飄飄！</div>
    </div>

    <div class="form-card">
        <div class="form-row">
            <div class="input-group">
                <label for="sys" id="lbl-sys">收縮壓 (🎚️ 凡心火氣)</label>
                <input type="number" id="sys" placeholder="mmHg" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="dia" id="lbl-dia">舒張壓 (🧘 內力定力)</label>
                <input type="number" id="dia" placeholder="mmHg" inputmode="numeric">
            </div>
        </div>
        <div class="form-row">
            <div class="input-group">
                <label for="pulse">心跳 (💓 靈魂悸動)</label>
                <input type="number" id="pulse" placeholder="bpm" inputmode="numeric">
            </div>
            <div class="input-group">
                <label for="period" id="lbl-period">量測時辰 (⏳ 第幾柱香)</label>
                <select id="period">
                    <option value="第1柱香(起床)">第1柱香 (起床空腹)</option>
                    <option value="第2柱香(飯後)">第2柱香 (溫飽之後)</option>
                    <option value="第3柱香(睡前)">第3柱香 (夜深安寢)</option>
                </select>
            </div>
        </div>
        <button class="submit-btn" id="submit-btn" onclick="addRecord()">恭請大師開光登記 📝</button>
    </div>

    <div class="chart-card">
        <canvas id="bpChart"></canvas>
    </div>

    <div class="history-card">
        <div class="history-title" id="history-title">📜 大師功德簿 (歷史法會紀錄)</div>
        <ul class="history-list" id="history-list">
            </ul>
    </div>

    <script>
        // 預設主題：god (九天玄女版), medical (專業醫療版)
        let currentTheme = 'god';
        let records = JSON.parse(localStorage.getItem('bp_records')) || [];
        let chart = null;

        // 語意字典
        const langDict = {
            god: {
                title: "🔮 九天玄女血壓算命攤",
                btnText: "切換至 專業醫療版 🏥",
                masterTitle: "🛸 九天玄女開光開運開示",
                masterWelcome: "恭請九天玄女駕臨！快搯指量一下今日血壓，看是凡心浮躁（血壓高）還是仙氣飄飄！",
                lblSys: "收縮壓 (🎚️ 凡心火氣)",
                lblDia: "舒張壓 (🧘 內力定力)",
                lblPeriod: "量測時辰 (⏳ 第幾柱香)",
                p1: "第1柱香 (起床空腹)",
                p2: "第2柱香 (溫飽之後)",
                p3: "第3柱香 (夜深安寢)",
                submitBtn: "恭請大師開光登記 📝",
                historyTitle: "📜 大師功德簿 (歷史法會紀錄)"
            },
            medical: {
                title: "🏥 專業智能血壓管理系統",
                btnText: "切換至 九天玄女版 🔮",
                masterTitle: "🩺 專業健康管理衛教提示",
                masterWelcome: "您好，歡迎使用血壓管理系統。請保持心情平靜，每天定時定量並記錄數值，以利健康追蹤。",
                lblSys: "收縮壓 (Systolic)",
                lblDia: "舒張壓 (Diastolic)",
                lblPeriod: "量測時段 (Period)",
                p1: "第一次 (起床空腹)",
                p2: "第二次 (中飯/飯後)",
                p3: "第三次 (夜間/睡前)",
                submitBtn: "儲存本次量測紀錄 💾",
                historyTitle: "📊 歷史血壓數據報告"
            }
        };

        // 主題切換功能
        function toggleTheme() {
            if (currentTheme === 'god') {
                currentTheme = 'medical';
                document.body.classList.add('theme-medical');
            } else {
                currentTheme = 'god';
                document.body.classList.remove('theme-medical');
            }
            updateUIStrings();
            updateChartStyle();
        }

        // 更新介面文字
        function updateUIStrings() {
            const dict = langDict[currentTheme];
            document.getElementById('app-title').innerText = dict.title;
            document.getElementById('theme-btn').innerText = dict.btnText;
            document.getElementById('master-title').innerText = dict.masterTitle;
            document.getElementById('lbl-sys').innerText = dict.lblSys;
            document.getElementById('lbl-dia').innerText = dict.lblDia;
            document.getElementById('lbl-period').innerText = dict.lblPeriod;
            document.getElementById('submit-btn').innerText = dict.submitBtn;
            document.getElementById('history-title').innerText = dict.historyTitle;

            // 更新下拉選單
            const select = document.getElementById('period');
            select.options[0].text = dict.p1;
            select.options[1].text = dict.p2;
            select.options[2].text = dict.p3;

            // 如果剛開起沒有大師開示診斷，顯示預設歡迎詞
            if(records.length === 0) {
                document.getElementById('master-text').innerText = dict.masterWelcome;
            } else {
                generateMasterAdvice(records[0]); // 根據最新一筆數據重新給予當前主題的開示
            }
            renderRecords();
        }

        // 大師與管理師的診斷開示邏輯
        function generateMasterAdvice(record) {
            const sys = parseInt(record.sys);
            const dia = parseInt(record.dia);
            let status = "normal";

            if (sys >= 140 || dia >= 90) status = "high";
            else if (sys < 90 || dia < 60) status = "low";

            const adviceDict = {
                god: {
                    high: `💥 夭壽！凡心大動、火氣罡風高達 ${sys}！九天玄女警告：這不是降肉，這是血壓在噴發！快去喝口水、打坐，休得浮躁！`,
                    low: `🍃 仙氣太飄、內力弱化 (${sys}/${dia})！施主是不是剛修煉完忘記吃飯？飄飄欲仙容易頭暈，快去補點凡間五穀！`,
                    normal: `✨ 善哉善哉！${sys}/${dia} 氣場四平八穩。四海八荒皆在掌控之中，繼續保持法身清淨！`
                },
                medical: {
                    high: `⚠️ 警告：目前血壓值 (${sys}/${dia} mmHg) 偏高，已達高血壓警戒範圍。請避免劇烈運動，適度休息，並遵照醫囑管理。`,
                    low: `⚠️ 提示：目前血壓值 (${sys}/${dia} mmHg) 偏低。如伴隨頭暈、乏力，請坐下休息，適時補充水分與營養。`,
                    normal: `✅ 優良：目前血壓值 (${sys}/${dia} mmHg) 處於正常標準範圍。請繼續保持規律的作息與健康飲食。`
                }
            };

            document.getElementById('master-text').innerText = adviceDict[currentTheme][status];
        }

        // 新增紀錄
        function addRecord() {
            const sys = document.getElementById('sys').value;
            const dia = document.getElementById('dia').value;
            const pulse = document.getElementById('pulse').value;
            const period = document.getElementById('period').value;

            if (!sys || !dia || !pulse) {
                alert(currentTheme === 'god' ? "大師提醒：數值不可留白，否則無法算命！" : "系統提示：請完整輸入所有量測數值。");
                return;
            }

            const now = new Date();
            const timeStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

            const newRecord = { id: Date.now(), sys, dia, pulse, period, time: timeStr };
            records.unshift(newRecord);
            localStorage.setItem('bp_records', JSON.stringify(records));

            // 清空輸入
            document.getElementById('sys').value = '';
            document.getElementById('dia').value = '';
            document.getElementById('pulse').value = '';

            generateMasterAdvice(newRecord);
            renderRecords();
            updateChart();
        }

        // 刪除紀錄
        function deleteRecord(id) {
            if(confirm(currentTheme === 'god' ? "確定要將此道功德法會紀錄抹去？" : "確定要刪除此筆量測紀錄？")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('bp_records', JSON.stringify(records));
                if(records.length > 0) generateMasterAdvice(records[0]);
                else document.getElementById('master-text').innerText = langDict[currentTheme].masterWelcome;
                renderRecords();
                updateChart();
            }
        }

        // 渲染歷史清單
        function renderRecords() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            records.forEach(r => {
                // 轉換時段顯示文字
                let displayPeriod = r.period;
                if (currentTheme === 'medical') {
                    if(r.period.includes("第1柱香")) displayPeriod = "起床空腹";
                    else if(r.period.includes("第2柱香")) displayPeriod = "中飯/飯後";
                    else if(r.period.includes("第3柱香")) displayPeriod = "夜間/睡前";
                }

                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <div class="item-left">
                        <span class="item-time">${r.time} • ${displayPeriod}</span>
                        <span class="item-bp">${r.sys} / ${r.dia} <small style="font-weight:normal; font-size:12px; color:rgba(255,255,255,0.6)">mmHg</small></span>
                    </div>
                    <div class="item-right">
                        <span class="pulse-badge">💓 ${r.pulse}</span>
                        <button class="delete-btn" onclick="deleteRecord(${r.id})">${currentTheme==='god'?'渡化':'刪除'}</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // 圖表初始化與更新
        function initChart() {
            const ctx = document.getElementById('bpChart').getContext('2d');
            const accentColor = getComputedStyle(document.body).getPropertyValue('--accent').trim();
            
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#fff' } }
                    },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.6)' } },
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.6)' } }
                    }
                }
            });
            updateChart();
        }

        function updateChart() {
            if(!chart) return;
            // 取最近 7 筆由舊到新排列展示
            const displayRecords = [...records].slice(0, 7).reverse();
            
            chart.data.labels = displayRecords.map(r => r.time.split(' ')[0]); // 只留日期
            chart.data.datasets = [
                {
                    label: currentTheme === 'god' ? '凡心火氣(收縮壓)' : '收縮壓 (SYS)',
                    data: displayRecords.map(r => r.sys),
                    borderColor: '#ff5b5b',
                    backgroundColor: 'rgba(255, 91, 91, 0.1)',
                    tension: 0.3,
                    fill: true
                },
                {
                    label: currentTheme === 'god' ? '內力定力(舒張壓)' : '舒張壓 (DIA)',
                    data: displayRecords.map(r => r.dia),
                    borderColor: currentTheme === 'god' ? '#ffd700' : '#38bdf8',
                    backgroundColor: 'transparent',
                    tension: 0.3
                }
            ];
            chart.update();
        }

        function updateChartStyle() {
            if(!chart) return;
            chart.options.plugins.legend.labels.color = currentTheme === 'god' ? '#e1d7f0' : '#f1f5f9';
            updateChart();
        }

        // 初始化啟動
        window.onload = () => {
            updateUIStrings();
            initChart();
        };
    </script>
</body>
</html>
